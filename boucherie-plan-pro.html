<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Checklist Nettoyage HACCP — Au Comptoir des Lilas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#e8e7e2;--panel:#fafaf8;--panel2:#f2f1ec;--border:#d0cfc8;
  --accent:#c0392b;--green:#2e7d32;
  --dark:#1a1a1a;--mid:#555;--light:#888;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --pending-fill:#ffebee;--pending-stroke:#e53935;
  --progress-fill:#fff3e0;--progress-stroke:#fb8c00;
  --clean-fill:#e8f5e9;--clean-stroke:#43a047;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--dark);font-size:14px}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.app-body{display:flex;flex:1;overflow:hidden;min-height:0}

/* ── HEADER ── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;height:48px;background:var(--dark);color:#fff;
  flex-shrink:0;z-index:100;
}
.app-header h1{font-size:14px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.app-header .sub{font-size:9px;opacity:.6;font-family:var(--mono)}
.badge{background:var(--accent);padding:3px 9px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:3px;white-space:nowrap}

/* ══════════════════════════════════════════════════════════
   PANNEAU GAUCHE — Plan SVG (verrouillé, affichage seul)
══════════════════════════════════════════════════════════ */
.plan-pane{
  flex:1 1 50%;min-width:0;display:flex;flex-direction:column;
  background:#c0bfb8;border-right:1px solid var(--border);
  position:relative;overflow:hidden;
}
.plan-toolbar{
  display:flex;align-items:center;gap:8px;padding:6px 12px;
  background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;
  min-height:44px;
}
.plan-toolbar .pt-title{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--mid);margin-right:auto}
.plan-toolbar button{
  font-family:var(--font);font-size:12px;font-weight:600;
  padding:7px 12px;border:1.5px solid var(--border);border-radius:6px;
  cursor:pointer;background:#fff;color:var(--dark);
  display:flex;align-items:center;gap:4px;
  min-height:34px;touch-action:manipulation;
}
.plan-toolbar button:active{background:#eee}
.plan-canvas{flex:1;overflow:hidden;position:relative}
#fp{width:100%;height:100%;display:block;cursor:default;touch-action:none}

.plan-legend{
  display:flex;justify-content:center;gap:14px;padding:6px 10px;
  background:#fff;border-top:1px solid var(--border);flex-shrink:0;
  font-size:10px;color:var(--mid);
}
.plan-legend .leg{display:flex;align-items:center;gap:5px}
.leg-dot{width:14px;height:10px;border-radius:2px;flex-shrink:0}
.leg-dot.pending {background:var(--pending-fill); border:1.5px solid var(--pending-stroke)}
.leg-dot.progress{background:var(--progress-fill);border:1.5px solid var(--progress-stroke)}
.leg-dot.clean   {background:var(--clean-fill);   border:1.5px solid var(--clean-stroke)}

/* ── SVG ── */
.plan-el{cursor:default;pointer-events:none}

/* ══════════════════════════════════════════════════════════
   PANNEAU DROIT — Checklist
══════════════════════════════════════════════════════════ */
.checklist-pane{
  flex:1 1 50%;min-width:0;display:flex;flex-direction:column;
  background:var(--panel);overflow:hidden;
}

/* Bandeau progression global */
.cl-progress{
  flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);
  padding:10px 14px;
}
.cl-progress-row{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.cl-progress-title{font-size:12px;font-weight:700;color:var(--dark);letter-spacing:.4px;text-transform:uppercase;flex:1}
.cl-progress-pct{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--green)}
.cl-progress-bar{height:9px;border-radius:5px;background:#e0e0e0;overflow:hidden}
.cl-progress-fill{height:100%;border-radius:5px;background:#43a047;transition:width .3s ease,background .3s ease}
.cl-progress-lbl{font-size:10px;color:var(--light);font-family:var(--mono);margin-top:4px;text-align:center;letter-spacing:.3px}

/* Liste des zones */
.cl-list{flex:1;overflow-y:auto;padding:10px 12px 8px;-webkit-overflow-scrolling:touch}
.cl-zone{
  background:#fff;border:1.5px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;
  transition:border-color .2s ease;
}
.cl-zone.zs-pending {border-color:var(--pending-stroke)}
.cl-zone.zs-progress{border-color:var(--progress-stroke)}
.cl-zone.zs-clean   {border-color:var(--clean-stroke);opacity:.92}

.cl-zone-header{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--panel2);border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;touch-action:manipulation;
}
.cl-zone.zs-pending  .cl-zone-header{background:var(--pending-fill)}
.cl-zone.zs-progress .cl-zone-header{background:var(--progress-fill)}
.cl-zone.zs-clean    .cl-zone-header{background:var(--clean-fill)}
.cl-zone-name{font-size:14px;font-weight:700;color:var(--dark);flex:1;letter-spacing:.3px}
.cl-zone-count{
  font-family:var(--mono);font-size:12px;font-weight:700;
  padding:3px 9px;border-radius:10px;background:#fff;color:var(--dark);
  border:1px solid rgba(0,0,0,.12);
}
.cl-zone.zs-clean .cl-zone-count{background:var(--green);color:#fff;border-color:var(--green)}
.cl-zone-chevron{font-size:11px;color:var(--mid);transition:transform .2s ease}
.cl-zone.is-collapsed .cl-zone-chevron{transform:rotate(-90deg)}
.cl-zone.is-collapsed .cl-tasks{display:none}

/* Tâches */
.cl-tasks{padding:6px 8px}
.cl-task{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:14px 12px;margin:3px 0;
  background:#fff;border:1.5px solid var(--border);border-radius:8px;
  cursor:pointer;user-select:none;touch-action:manipulation;
  transition:background .12s ease,border-color .12s ease;
  font-family:var(--font);font-size:14px;color:var(--dark);text-align:left;
  font-weight:500;
}
.cl-task:active{background:#f0efe9}
.cl-task .cl-check{
  width:26px;height:26px;border-radius:6px;
  border:2px solid var(--border);background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:transparent;flex-shrink:0;
  transition:all .15s ease;
}
.cl-task .cl-label{flex:1;line-height:1.3}
.cl-task.is-done{
  background:var(--clean-fill);border-color:var(--clean-stroke);
}
.cl-task.is-done .cl-check{
  background:var(--clean-stroke);border-color:var(--clean-stroke);color:#fff;
}
.cl-task.is-done .cl-label{color:#1b5e20;text-decoration:line-through;text-decoration-thickness:1.5px;text-decoration-color:#7cb87f}

/* Footer validation */
.cl-footer{
  flex-shrink:0;background:#fff;border-top:1px solid var(--border);
  padding:10px 14px env(safe-area-inset-bottom,10px);
}
.cl-footer-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cl-operator-label{font-size:11px;color:var(--mid);font-weight:600;flex-shrink:0}
.cl-operator-input{
  flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:6px;
  font-family:var(--font);font-size:14px;color:var(--dark);background:#fff;
  min-height:40px;
}
.cl-operator-input:focus{outline:2px solid #0070f3;border-color:#0070f3}
.cl-validate-btn{
  width:100%;padding:16px;border:none;border-radius:10px;
  background:linear-gradient(180deg,#43a047,#2e7d32);
  color:#fff;font-family:var(--font);font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.4px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 3px 0 #1b5e20,0 4px 12px rgba(46,125,50,.3);
  touch-action:manipulation;transition:transform .1s ease;
}
.cl-validate-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1b5e20,0 2px 6px rgba(46,125,50,.3)}
.cl-validate-btn:disabled{
  background:#bdbdbd;color:#757575;cursor:not-allowed;
  box-shadow:0 3px 0 #9e9e9e;
}
.cl-reset-btn{
  background:none;border:1px solid var(--border);color:var(--mid);
  padding:6px 11px;border-radius:6px;font-family:var(--font);font-size:11px;
  cursor:pointer;font-weight:600;
}
.cl-reset-btn:active{background:var(--panel2)}

/* ── NOTIFY ── */
.notify{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(26,26,26,.92);color:#fff;font-family:var(--mono);font-size:12px;padding:8px 18px;border-radius:6px;pointer-events:none;z-index:3000;opacity:0;transition:opacity .3s;white-space:nowrap}
.notify.vis{opacity:1}

/* ══════════════════════════════════════════════════════════
   RESPONSIVE — Tablette portrait & mobile
══════════════════════════════════════════════════════════ */
@media (max-width:1023px){
  .app-body{flex-direction:column}
  .plan-pane{
    flex:0 0 38vh;min-height:220px;max-height:42vh;
    border-right:none;border-bottom:1px solid var(--border);
  }
  .plan-toolbar{padding:5px 10px;min-height:40px}
  .plan-toolbar .pt-title{font-size:10px}
  .plan-legend{font-size:9px;gap:10px;padding:4px 8px}
  .checklist-pane{flex:1 1 auto}
}

@media (max-width:599px){
  .app-header{height:42px;padding:0 10px}
  .app-header h1{font-size:12px}
  .app-header .sub{display:none}
  .plan-pane{flex:0 0 32vh;min-height:180px}
  .cl-zone-name{font-size:13px}
  .cl-task{font-size:13px;padding:13px 10px;gap:10px}
  .cl-task .cl-check{width:24px;height:24px;font-size:16px}
  .cl-validate-btn{font-size:14px;padding:14px}
  .cl-progress-pct{font-size:16px}
}

/* ── PRINT ── */
@media print{
  .app-header,.plan-toolbar,.plan-legend,.cl-footer{display:none!important}
  .app-body{display:block}
  .plan-pane,.checklist-pane{flex:none;width:100%;border:none;background:#fff}
  #fp{width:100%!important;height:auto!important}
}
</style>
</head>
<body>
<div class="app">

  <!-- ── HEADER ── -->
  <div class="app-header">
    <div>
      <h1>CHECKLIST NETTOYAGE HACCP</h1>
      <div class="sub">Au Comptoir des Lilas · 122 rue de Paris · 93260 Les Lilas</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="dateHdr" style="font-size:9px;opacity:.55;font-family:var(--mono)"></span>
      <div class="badge">HACCP</div>
    </div>
  </div>

  <!-- ── BODY ── -->
  <div class="app-body">

    <!-- ═══════════ PANNEAU GAUCHE — PLAN ═══════════ -->
    <div class="plan-pane">
      <div class="plan-toolbar">
        <span class="pt-title">Plan — progression visuelle</span>
        <button onclick="setZoom(zoom-0.15)" aria-label="Zoom arrière">−</button>
        <button onclick="setZoom(zoom+0.15)" aria-label="Zoom avant">+</button>
        <button onclick="fitView()" title="Ajuster" aria-label="Ajuster vue">⊡</button>
      </div>
      <div class="plan-canvas">
        <svg id="fp" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="da1" markerWidth="5" markerHeight="5" refX="0" refY="2.5" orient="auto"><path d="M5,0 L0,2.5 L5,5Z" fill="#555"/></marker>
            <marker id="da2" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5Z" fill="#555"/></marker>
            <pattern id="ha" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="6" stroke="#888" stroke-width=".7"/></pattern>
          </defs>
          <g id="lElems"></g>
        </svg>
      </div>
      <div class="plan-legend">
        <span class="leg"><span class="leg-dot pending"></span>À nettoyer</span>
        <span class="leg"><span class="leg-dot progress"></span>En cours</span>
        <span class="leg"><span class="leg-dot clean"></span>Nettoyé</span>
      </div>
    </div>

    <!-- ═══════════ PANNEAU DROIT — CHECKLIST ═══════════ -->
    <div class="checklist-pane">

      <!-- Bandeau progression -->
      <div class="cl-progress">
        <div class="cl-progress-row">
          <div class="cl-progress-title">Checklist du jour</div>
          <div class="cl-progress-pct" id="globalPct">0%</div>
          <button class="cl-reset-btn" onclick="resetAll()" title="Réinitialiser">↺ Reset</button>
        </div>
        <div class="cl-progress-bar"><div class="cl-progress-fill" id="globalBar" style="width:0%"></div></div>
        <div class="cl-progress-lbl" id="globalLbl">0 / 0 tâches effectuées</div>
      </div>

      <!-- Liste des zones et tâches -->
      <div class="cl-list" id="checklistRoot"></div>

      <!-- Footer validation -->
      <div class="cl-footer">
        <div class="cl-footer-row">
          <label class="cl-operator-label" for="operatorInput">👤 Opérateur :</label>
          <input type="text" id="operatorInput" class="cl-operator-input" placeholder="Nom / signature…" autocomplete="off">
        </div>
        <button class="cl-validate-btn" id="validateBtn" onclick="validateDay()">
          ✓ Valider le nettoyage du jour
        </button>
      </div>

    </div>

  </div><!-- end app-body -->

</div><!-- end app -->

<!-- ── NOTIFY ── -->
<div class="notify" id="notify"></div>

<script>
'use strict';
// ════════════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════════════
const S = 65;
const CW = 1800;
const CH = 700;
const STORAGE_KEY = 'haccp_checklist_state_v1';

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let zoom = 1.0;
let panX = 0, panY = 0;
let _mouseButtonDown = false;
let isPanning = false;
let _panRawStart = {x:0,y:0};
let _panStart    = {x:0,y:0};
let _touchStartDist = 0;
let _touchStartZoom = 1;

let checkedTasks = new Set();          // task IDs cochées
let collapsedZones = new Set();        // zones repliées

// ════════════════════════════════════════════════════════════
// CHECKLIST — Tâches par zone
// ════════════════════════════════════════════════════════════
const CHECKLIST = [
  {zoneId:'frigo1', label:'FRIGO 1', tasks:[
    'Sol', 'Étagères', 'Joints porte', 'Évaporateur', 'Désinfection complète'
  ]},
  {zoneId:'frigo2', label:'FRIGO 2', tasks:[
    'Sol', 'Étagères', 'Joints porte', 'Évaporateur', 'Désinfection complète'
  ]},
  {zoneId:'vitrine', label:'VITRINE FROID', tasks:[
    'Vitres intérieures', 'Vitres extérieures', 'Bacs amovibles', 'Joints', 'Tablettes'
  ]},
  {zoneId:'prepa', label:'ESPACE PRÉPA', tasks:[
    'Sol', 'Siphon', 'Plan de travail', 'Murs', 'Billot', 'Plonge'
  ]},
  {zoneId:'cuisine', label:'CUISINE', tasks:[
    'Sol', 'Siphon', 'Plonge', 'Four', 'Plan de travail', 'Murs', 'Hotte'
  ]},
  {zoneId:'vente', label:'ESPACE CLIENT', tasks:[
    'Sol', 'Vitrines extérieures', 'Comptoir caisse', 'Poignées de porte'
  ]},
  {zoneId:'wc', label:'WC', tasks:[
    'Sol', 'Cuvette', 'Lavabo', 'Murs', 'Distributeur savon'
  ]},
];

function taskId(zoneId, idx){ return `${zoneId}::${idx}`; }

// ════════════════════════════════════════════════════════════
// DATA MODEL — Plan boucherie
// ════════════════════════════════════════════════════════════
const elements = [
  {id:'frigo2',      type:'zone', label:'FRIGO 2',         sublabel:'4 m × 1,55 m',
   x:40/S, y:30/S,  w:260/S, h:101/S, fill:'#dceefb',stroke:'#1a1a1a',sw:2.2,icon:'❄️',
   tracked:true},
  {id:'wc',          type:'zone', label:'WC',              sublabel:'2 m × 0,94 m',
   x:315/S,y:30/S,  w:130/S, h:61/S,  fill:'#efebe9',stroke:'#1a1a1a',sw:2.2,
   tracked:true},
  {id:'cuisine',     type:'zone', label:'CUISINE',         sublabel:'2,21 × 2,71 m',
   x:462/S,y:30/S,  w:143/S, h:176/S, fill:'#f3e5f5',stroke:'#1a1a1a',sw:2.2,
   tracked:true},
  {id:'frigo1',      type:'zone', label:'FRIGO 1',         sublabel:'4 m × 1,155 m',
   x:620/S,y:30/S,  w:260/S, h:75/S,  fill:'#dceefb',stroke:'#1a1a1a',sw:2.2,icon:'❄️',
   tracked:true},
  {id:'prepa',       type:'zone', label:'ESPACE PRÉPA',    sublabel:'4 m × 1,66 m',
   x:620/S,y:112/S, w:260/S, h:108/S, fill:'#fce4ec',stroke:'#1a1a1a',sw:2.2,
   tracked:true},
  {id:'vente',       type:'zone', label:'',                sublabel:'',
   x:895/S,y:30/S,  w:377/S, h:290/S, fill:'#fff8e1',stroke:'#1a1a1a',sw:3,
   tracked:true, displayLabel:'Espace client'},

  // Décor non suivi
  {id:'jardinet',    type:'zone', label:'JARDINET',        sublabel:'8,26 m × 3,27 m',
   x:40/S, y:152/S, w:537/S, h:213/S, fill:'#e8f5e9',stroke:'#1a1a1a',sw:1.8,dash:'7 4',pattern:'hatch',lc:'#2e7d32'},
  {id:'zone-boucher',type:'zone', label:'Zone boucher',    sublabel:'4,35 m × 1,30 m',
   x:895/S,y:66/S,  w:377/S, h:85/S,  fill:'#fff3e0',stroke:'#8d6e63',sw:.6,dash:'5 3',lc:'#8d6e63'},
  {id:'espace-arriere',type:'zone',label:'Espace arrière', sublabel:'',
   x:895/S,y:151/S, w:55/S,  h:88/S,  fill:'#f5f5f0',stroke:'#999',sw:1,dash:'4 3',lc:'#999'},

  // Équipements décor
  {id:'meuble-bas',  type:'equip', label:'MEUBLE BAS',   sublabel:'55 cm prof.',
   x:895/S,y:30/S,  w:340/S, h:36/S,  fill:'#d7ccc8',stroke:'#5d4037',sw:1.2},
  {id:'billot',      type:'equip', label:'Billot',
   x:700/S,y:186/S, w:48/S,  h:22/S,  fill:'#ffccbc',stroke:'#bf360c',sw:1.2},
  {id:'plonge',      type:'equip', label:'Plonge',
   x:640/S,y:186/S, w:42/S,  h:22/S,  fill:'#bbdefb',stroke:'#1565c0',sw:1.2},
  {id:'caisse',      type:'equip', label:'CAISSE',       sublabel:'mobile',
   x:895/S,y:239/S, w:55/S,  h:81/S,  fill:'#c8e6c9',stroke:'#2e7d32',sw:2},

  // Vitrine froid (suivie)
  {id:'vitrine',     type:'vitrine', label:'VITRINE FROID',
   x:960/S, y:151/S,
   barLength:270/S, barThickness:0.8,
   armLength:78/S,  armThickness:0.8,
   fill:'#7e57c2', stroke:'#4a148c',
   tracked:true},

  // Portes
  {id:'entree',    type:'door',label:'ENTRÉE',         x:1266/S,y:275/S,dw:45/S,rot:90, openDir:-1,fill:'#c0392b'},
  {id:'porte-pv',  type:'door',label:'Prépa→Vente',    x:889/S, y:130/S,dw:35/S,rot:90, openDir:1, fill:'#2e7d32'},
  {id:'porte-cj',  type:'door',label:'Cuisine→Jardin', x:462/S, y:165/S,dw:35/S,rot:90, openDir:1, fill:'#2e7d32'},
  {id:'porte-pc',  type:'door',label:'Prépa→Cuisine',  x:612/S, y:132/S,dw:35/S,rot:90, openDir:1, fill:'#2e7d32'},
];

// ════════════════════════════════════════════════════════════
// HACCP — Status helpers
// ════════════════════════════════════════════════════════════
const HACCP_STYLES = {
  pending:  {fill:'#ffebee', stroke:'#e53935', sw:2.5},
  progress: {fill:'#fff3e0', stroke:'#fb8c00', sw:2.5},
  clean:    {fill:'#e8f5e9', stroke:'#43a047', sw:2.5},
};

function zoneProgress(zoneId){
  const def = CHECKLIST.find(c => c.zoneId === zoneId);
  if(!def) return {done:0, total:0, status:'pending'};
  const total = def.tasks.length;
  let done = 0;
  for(let i=0; i<total; i++){
    if(checkedTasks.has(taskId(zoneId, i))) done++;
  }
  let status = 'pending';
  if(done === total && total > 0) status = 'clean';
  else if(done > 0) status = 'progress';
  return {done, total, status};
}
function getZoneStatus(zoneId){ return zoneProgress(zoneId).status; }

// ════════════════════════════════════════════════════════════
// SVG UTILITIES
// ════════════════════════════════════════════════════════════
const svg = document.getElementById('fp');
function px(m){ return m * S; }
function getEl(id){ return elements.find(e => e.id === id); }

function showNotify(msg, ms=2200){
  const n = document.getElementById('notify');
  n.textContent = msg; n.classList.add('vis');
  setTimeout(() => n.classList.remove('vis'), ms);
}

// ════════════════════════════════════════════════════════════
// ZOOM / PAN / VIEW
// ════════════════════════════════════════════════════════════
function updateViewBox(){
  svg.setAttribute('viewBox', `${panX} ${panY} ${CW/zoom} ${CH/zoom}`);
}
function svgPtFromClient(cx, cy){
  const rect = svg.getBoundingClientRect();
  const vw = CW/zoom, vh = CH/zoom;
  const scale = Math.min(rect.width/vw, rect.height/vh);
  const ox = (rect.width  - vw*scale) / 2;
  const oy = (rect.height - vh*scale) / 2;
  return {
    x: panX + (cx - rect.left - ox) / scale,
    y: panY + (cy - rect.top  - oy) / scale,
  };
}
function setZoom(z, cx, cy){
  z = Math.max(.1, Math.min(5, z));
  if(cx !== undefined && cy !== undefined){
    const ratio = zoom/z;
    panX = cx - (cx - panX)*ratio;
    panY = cy - (cy - panY)*ratio;
  }
  zoom = z;
  updateViewBox();
}
function elBBox(el){
  if(!el) return null;
  if(el.type==='vitrine'){
    const bx=px(el.x),by=px(el.y),bw=px(el.barLength),bh=px(el.barThickness);
    const al=px(el.armLength),at=px(el.armThickness);
    return{x:bx,y:by-al,w:bw,h:bh+2*al};
  }
  if(el.type==='door'){
    const bx=px(el.x),by=px(el.y);
    const dw=px(el.dw||.9),rot=(el.rot||0)*Math.PI/180,od=el.openDir||1;
    const cos=Math.cos(rot),sin=Math.sin(rot);
    const pts=[{x:0,y:0},{x:dw,y:0},{x:0,y:-dw*od}];
    const xs=pts.map(p=>bx+p.x*cos-p.y*sin);
    const ys=pts.map(p=>by+p.x*sin+p.y*cos);
    return{x:Math.min(...xs)-8,y:Math.min(...ys)-8,w:Math.max(...xs)-Math.min(...xs)+16,h:Math.max(...ys)-Math.min(...ys)+16};
  }
  return{x:px(el.x),y:px(el.y),w:px(el.w||.5),h:px(el.h||.5)};
}
function fitView(){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  elements.forEach(el => {
    const bb = elBBox(el); if(!bb) return;
    minX=Math.min(minX,bb.x); minY=Math.min(minY,bb.y);
    maxX=Math.max(maxX,bb.x+bb.w); maxY=Math.max(maxY,bb.y+bb.h);
  });
  if(minX===Infinity){ panX=0; panY=0; setZoom(1); return; }
  const margin = 30;
  const ww = svg.clientWidth, wh = svg.clientHeight;
  const zx = (ww-margin*2)/(maxX-minX+0.001);
  const zy = (wh-margin*2)/(maxY-minY+0.001);
  panX = minX - margin/Math.min(zx,zy,3);
  panY = minY - margin/Math.min(zx,zy,3);
  setZoom(Math.min(zx,zy,3));
}

// ════════════════════════════════════════════════════════════
// SVG RENDER
// ════════════════════════════════════════════════════════════
function renderPlan(){
  const order={zone:0,equip:1,vitrine:2,door:3};
  const sorted=[...elements].sort((a,b)=>(order[a.type]||0)-(order[b.type]||0));
  document.getElementById('lElems').innerHTML = sorted.map(renderEl).join('');
}
function renderEl(el){
  switch(el.type){
    case 'zone':    return renderZone(el);
    case 'equip':   return renderEquip(el);
    case 'vitrine': return renderVitrine(el);
    case 'door':    return renderDoor(el);
    default: return '';
  }
}
function renderZone(el){
  const x=px(el.x),y=px(el.y),w=px(el.w),h=px(el.h);
  const status = el.tracked ? getZoneStatus(el.id) : null;
  const hs = status ? HACCP_STYLES[status] : null;
  const fillColor   = hs ? hs.fill   : (el.fill||'#fff');
  const strokeColor = hs ? hs.stroke : (el.stroke||'#1a1a1a');
  const strokeWidth = hs ? hs.sw     : (el.sw||2);
  const lc = hs ? strokeColor : (el.lc||'#1a1a1a');
  const dash = el.dash ? `stroke-dasharray="${el.dash}"` : '';
  const cx=x+w/2, cy=y+h/2;
  const fsize = w<80||h<40?10:14;
  const labelTxt = el.displayLabel || el.label;
  const sublabel = el.sublabel||'';
  return`<g class="plan-el" data-id="${el.id}">
    <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fillColor}" stroke="${strokeColor}" stroke-width="${strokeWidth}" ${dash}/>
    ${el.pattern==='hatch'?`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="url(#ha)" opacity=".18"/>`:''}
    ${labelTxt?`<text x="${cx}" y="${cy-(sublabel?7:0)}" font-family="'DM Sans'" font-size="${fsize}" font-weight="700" fill="${lc}" text-anchor="middle" dominant-baseline="middle">${labelTxt}</text>`:''}
    ${sublabel?`<text x="${cx}" y="${cy+(labelTxt?8:0)}" font-family="'JetBrains Mono'" font-size="8" fill="#666" text-anchor="middle">${sublabel}</text>`:''}
    ${el.icon?`<text x="${x+10}" y="${y+16}" font-size="12">${el.icon}</text>`:''}
  </g>`;
}
function renderEquip(el){
  const x=px(el.x),y=px(el.y),w=px(el.w||.5),h=px(el.h||.5);
  const cx=x+w/2,cy=y+h/2;
  const fill = el.fill||'#f5f5f5', stroke = el.stroke||'#888', sw = el.sw||1.2;
  const fsize = Math.min(9, w/Math.max(1,(el.label||'').length)*1.5);
  return`<g class="plan-el" data-id="${el.id}">
    <rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" rx="2"/>
    ${el.label?`<text x="${cx}" y="${cy+1}" font-family="'DM Sans'" font-size="${fsize}" fill="${el.lc||'#333'}" text-anchor="middle" dominant-baseline="middle" font-weight="600">${el.label}</text>`:''}
    ${el.sublabel?`<text x="${cx}" y="${cy+12}" font-family="'JetBrains Mono'" font-size="7" fill="#888" text-anchor="middle">${el.sublabel}</text>`:''}
  </g>`;
}
function renderVitrine(el){
  const bx=px(el.x),by=px(el.y),bw=px(el.barLength),bh=px(el.barThickness);
  const al=px(el.armLength||0),at=px(el.armThickness||0.8);
  const f=el.fill||'#7e57c2',s=el.stroke||'#4a148c';
  const status = el.tracked ? getZoneStatus(el.id) : null;
  const hs = status ? HACCP_STYLES[status] : null;
  const overlay = hs ? `<rect x="${bx-4}" y="${by-al-4}" width="${bw+8}" height="${bh+2*al+8}" fill="${hs.fill}" opacity=".35" stroke="${hs.stroke}" stroke-width="3" rx="4"/>` : '';
  return`<g class="plan-el" data-id="${el.id}">
    ${overlay}
    <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${f}" stroke="${s}" stroke-width="1.5" rx="1"/>
    <line x1="${bx}" y1="${by+bh}" x2="${bx+bw}" y2="${by+bh}" stroke="${s}" stroke-width="3" stroke-linecap="square"/>
    <rect x="${bx+bw-at}" y="${by-al}" width="${at}" height="${al}" fill="${f}" stroke="${s}" stroke-width="1.5" rx="1"/>
    <rect x="${bx}" y="${by+bh}" width="${at}" height="${al}" fill="${f}" stroke="${s}" stroke-width="1.5" rx="1"/>
    <text x="${bx+bw/2}" y="${by-al-6}" font-family="'DM Sans'" font-size="10" fill="${s}" text-anchor="middle" font-weight="700">${el.label||'VITRINE FROID'}</text>
  </g>`;
}
function renderDoor(el){
  const bx=px(el.x),by=px(el.y),dw=px(el.dw||.9);
  const rot=el.rot||0,od=el.openDir||1,col=el.fill||'#2e7d32';
  const leafY=-dw*od,sweepFlag=od===1?1:0;
  return`<g data-id="${el.id}" transform="translate(${bx},${by}) rotate(${rot},0,0)">
    <line x1="-2" y1="0" x2="${dw+2}" y2="0" stroke="#333" stroke-width="2.5"/>
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#333" stroke-width="1.5"/>
    <line x1="${dw}" y1="-4" x2="${dw}" y2="4" stroke="#333" stroke-width="1.5"/>
    <path d="M 0 ${leafY} A ${dw} ${dw} 0 0 ${sweepFlag} ${dw} 0" stroke="${col}" stroke-width="0.8" fill="${col}15"/>
  </g>`;
}

// ════════════════════════════════════════════════════════════
// CHECKLIST RENDER
// ════════════════════════════════════════════════════════════
function renderChecklist(){
  const root = document.getElementById('checklistRoot');
  root.innerHTML = CHECKLIST.map(zone => {
    const {done, total, status} = zoneProgress(zone.zoneId);
    const collapsed = collapsedZones.has(zone.zoneId) ? 'is-collapsed' : '';
    const tasksHtml = zone.tasks.map((label, i) => {
      const tid = taskId(zone.zoneId, i);
      const done = checkedTasks.has(tid) ? 'is-done' : '';
      return `<div class="cl-task ${done}" data-task="${tid}" role="checkbox" aria-checked="${done?'true':'false'}">
        <div class="cl-check">✓</div>
        <div class="cl-label">${label}</div>
      </div>`;
    }).join('');
    return `<div class="cl-zone zs-${status} ${collapsed}" data-zone="${zone.zoneId}">
      <div class="cl-zone-header" data-zone-toggle="${zone.zoneId}">
        <span class="cl-zone-name">${zone.label}</span>
        <span class="cl-zone-count">${done} / ${total}</span>
        <span class="cl-zone-chevron">▼</span>
      </div>
      <div class="cl-tasks">${tasksHtml}</div>
    </div>`;
  }).join('');
}

function updateGlobalProgress(){
  let done = 0, total = 0;
  CHECKLIST.forEach(z => {
    total += z.tasks.length;
    z.tasks.forEach((_, i) => { if(checkedTasks.has(taskId(z.zoneId, i))) done++; });
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('globalPct').textContent = pct + '%';
  const bar = document.getElementById('globalBar');
  bar.style.width = pct + '%';
  bar.style.background = pct === 100 ? '#2e7d32' : (pct > 0 ? '#43a047' : '#bdbdbd');
  document.getElementById('globalLbl').textContent = `${done} / ${total} tâches effectuées`;

  const btn = document.getElementById('validateBtn');
  btn.disabled = (done === 0);
  btn.textContent = pct === 100 ? '✓ Valider — 100% terminé' : `✓ Valider le nettoyage du jour (${pct}%)`;
}

// ════════════════════════════════════════════════════════════
// CHECKLIST — Actions
// ════════════════════════════════════════════════════════════
function toggleTask(tid){
  if(checkedTasks.has(tid)) checkedTasks.delete(tid);
  else checkedTasks.add(tid);
  saveState();
  renderPlan();
  renderChecklist();
  updateGlobalProgress();
}
function toggleZone(zoneId){
  if(collapsedZones.has(zoneId)) collapsedZones.delete(zoneId);
  else collapsedZones.add(zoneId);
  renderChecklist();
}
function resetAll(){
  if(checkedTasks.size === 0){
    showNotify('Aucune tâche cochée');
    return;
  }
  if(!confirm('Réinitialiser toutes les cases ?\nCela démarre une nouvelle session.')) return;
  checkedTasks.clear();
  saveState();
  renderPlan();
  renderChecklist();
  updateGlobalProgress();
  showNotify('↺ Nouvelle session');
}

function validateDay(){
  const operator = document.getElementById('operatorInput').value.trim();
  if(!operator){
    showNotify('⚠ Saisir le nom de l\'opérateur');
    document.getElementById('operatorInput').focus();
    return;
  }
  let done = 0, total = 0;
  CHECKLIST.forEach(z => {
    total += z.tasks.length;
    z.tasks.forEach((_, i) => { if(checkedTasks.has(taskId(z.zoneId, i))) done++; });
  });
  if(done === 0){ showNotify('Aucune tâche cochée'); return; }
  const pct = Math.round(done/total*100);
  const ok = confirm(`Valider le nettoyage du jour ?\n\nOpérateur : ${operator}\nProgression : ${done} / ${total} (${pct}%)\n\nCette action enregistre la session.`);
  if(!ok) return;
  showNotify(`✓ Session validée par ${operator} — ${pct}%`, 3500);
  // TODO : envoi API plus tard
}

// ════════════════════════════════════════════════════════════
// PERSISTANCE — localStorage (jour courant)
// ════════════════════════════════════════════════════════════
function saveState(){
  try{
    const today = new Date().toISOString().slice(0,10);
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      date: today,
      checked: [...checkedTasks],
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    const today = new Date().toISOString().slice(0,10);
    if(data.date === today && Array.isArray(data.checked)){
      checkedTasks = new Set(data.checked);
    }
  }catch(e){}
}

// ════════════════════════════════════════════════════════════
// EVENT DELEGATION — Checklist
// ════════════════════════════════════════════════════════════
document.getElementById('checklistRoot').addEventListener('click', (e) => {
  const taskEl = e.target.closest('[data-task]');
  if(taskEl){ toggleTask(taskEl.dataset.task); return; }
  const headerEl = e.target.closest('[data-zone-toggle]');
  if(headerEl){ toggleZone(headerEl.dataset.zoneToggle); return; }
});

// ════════════════════════════════════════════════════════════
// PLAN — Pan & zoom (touch + mouse), pas de sélection
// ════════════════════════════════════════════════════════════
svg.addEventListener('mousedown', (e) => {
  _mouseButtonDown = true; isPanning = false;
  _panRawStart = {x:e.clientX, y:e.clientY};
  _panStart = {x:panX, y:panY};
});
svg.addEventListener('mousemove', (e) => {
  if(!_mouseButtonDown) return;
  const dx = e.clientX - _panRawStart.x, dy = e.clientY - _panRawStart.y;
  if(!isPanning && (Math.abs(dx) > 4 || Math.abs(dy) > 4)) isPanning = true;
  if(isPanning){ panX = _panStart.x - dx/zoom; panY = _panStart.y - dy/zoom; updateViewBox(); }
});
svg.addEventListener('mouseup',   () => { _mouseButtonDown = false; isPanning = false; });
svg.addEventListener('mouseleave',() => { _mouseButtonDown = false; isPanning = false; });
svg.addEventListener('wheel', (e) => {
  e.preventDefault();
  const pt = svgPtFromClient(e.clientX, e.clientY);
  setZoom(zoom * (e.deltaY < 0 ? 1.12 : .88), pt.x, pt.y);
}, {passive:false});

function touchDist(t1,t2){ return Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY); }
function touchMid(t1,t2){ return {x:(t1.clientX+t2.clientX)/2, y:(t1.clientY+t2.clientY)/2}; }

svg.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if(e.touches.length === 1){
    _mouseButtonDown = true; isPanning = false;
    _panRawStart = {x:e.touches[0].clientX, y:e.touches[0].clientY};
    _panStart = {x:panX, y:panY};
  } else if(e.touches.length === 2){
    _mouseButtonDown = false;
    _touchStartDist = touchDist(e.touches[0], e.touches[1]);
    _touchStartZoom = zoom;
  }
}, {passive:false});

svg.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if(e.touches.length === 1 && _mouseButtonDown){
    const t = e.touches[0];
    const dx = t.clientX - _panRawStart.x, dy = t.clientY - _panRawStart.y;
    if(!isPanning && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) isPanning = true;
    if(isPanning){ panX = _panStart.x - dx/zoom; panY = _panStart.y - dy/zoom; updateViewBox(); }
  } else if(e.touches.length === 2){
    const dist = touchDist(e.touches[0], e.touches[1]);
    const scale = dist / _touchStartDist;
    const newZoom = Math.max(.15, Math.min(5, _touchStartZoom * scale));
    const mid = touchMid(e.touches[0], e.touches[1]);
    const pt = svgPtFromClient(mid.x, mid.y);
    setZoom(newZoom, pt.x, pt.y);
  }
}, {passive:false});

svg.addEventListener('touchend', () => { _mouseButtonDown = false; isPanning = false; }, {passive:false});

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
function init(){
  const d = new Date();
  document.getElementById('dateHdr').textContent = d.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short', year:'numeric'});
  loadState();
  updateViewBox();
  renderPlan();
  renderChecklist();
  updateGlobalProgress();
  requestAnimationFrame(() => fitView());
  window.addEventListener('resize', () => requestAnimationFrame(fitView));
}
init();
</script>
