<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Stock unifié — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/inventaire.css">
  <style>
    /* ── Gabarit impression thermique Brother 62mm — étiquette inventaire ── */
    #print-label-inv { display: none; }
    @media print {
      @page { size: 62mm auto; margin: 0; }
      html, body { margin: 0; padding: 0; height: auto; background: white; }
      body > *:not(#print-label-inv) { display: none !important; }
      #print-label-inv {
        display: block;
        position: static;
        width: 100%;
        box-sizing: border-box;
        padding: 2mm;
        margin: 0;
        color: black;
        background: white;
        font-family: sans-serif;
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body class="inv-body">

  <header class="inv-bar">
    <a href="/hub.html" class="inv-retour" aria-label="Retour accueil">← Accueil</a>
    <div class="inv-bar-titre">📋 Stock unifié</div>
    <div style="display:flex;align-items:center;gap:.5rem;">
      <button type="button" id="inv-btn-gestion" class="inv-btn-gestion" aria-pressed="false">
        ✏️ Gérer
      </button>
      <div id="inv-horloge" class="inv-horloge" aria-live="polite"></div>
    </div>
  </header>

  <!-- Bandeau statistiques -->
  <section class="inv-stats" aria-live="polite">
    <div class="inv-stat inv-stat--total">
      <div class="inv-stat-num" id="inv-stat-total">—</div>
      <div class="inv-stat-lbl">Total</div>
    </div>
    <div class="inv-stat inv-stat--reception">
      <div class="inv-stat-num" id="inv-stat-reception">—</div>
      <div class="inv-stat-lbl">📦 Réceptions</div>
    </div>
    <div class="inv-stat inv-stat--fabrication">
      <div class="inv-stat-num" id="inv-stat-fabrication">—</div>
      <div class="inv-stat-lbl">🔪 Fabrications</div>
    </div>
    <div class="inv-stat inv-stat--cuisson">
      <div class="inv-stat-num" id="inv-stat-cuisson">—</div>
      <div class="inv-stat-lbl">🔥 Cuissons</div>
    </div>
    <div class="inv-stat inv-stat--refroidissement">
      <div class="inv-stat-num" id="inv-stat-refroidissement">—</div>
      <div class="inv-stat-lbl">❄️ Refroidis</div>
    </div>
    <div class="inv-stat inv-stat--alerte">
      <div class="inv-stat-num" id="inv-stat-3j">—</div>
      <div class="inv-stat-lbl">⏰ ≤ 3 jours</div>
    </div>
  </section>

  <!-- Filtres -->
  <section class="inv-filtres">
    <label class="inv-filtre inv-filtre--search">
      <span>Recherche</span>
      <div class="inv-search-wrap">
        <input type="search" id="inv-filtre-recherche"
               placeholder="Nom du produit ou N° de lot…"
               autocomplete="off" inputmode="search"
               aria-label="Rechercher un produit par nom ou numéro de lot"
               aria-autocomplete="list" aria-controls="inv-ac-recherche">
        <button type="button" class="inv-search-chev" id="inv-ac-toggle"
                aria-label="Voir tous les produits en stock"
                title="Voir tous les produits">▾</button>
        <div id="inv-ac-recherche" class="inv-autocomplete" hidden role="listbox"></div>
      </div>
    </label>
    <label class="inv-filtre">
      <span>Espèce</span>
      <select id="inv-filtre-espece">
        <option value="">Toutes</option>
      </select>
    </label>
    <label class="inv-filtre">
      <span>Type</span>
      <select id="inv-filtre-type">
        <option value="tous">Tous</option>
        <option value="brut">📦 Bruts (réception)</option>
        <option value="fini">🔪🔥❄️ Finis (transformés)</option>
      </select>
    </label>
    <label class="inv-filtre">
      <span>Catégorie</span>
      <select id="inv-filtre-categorie">
        <option value="">Toutes</option>
        <option value="matiere_premiere">Matière première</option>
        <option value="viande_hachee">Viande hachée</option>
        <option value="viande_pieces">Pièces de viande</option>
        <option value="preparation_crue">Préparation crue</option>
        <option value="charcuterie_tranchee">Charcuterie tranchée</option>
        <option value="plat_cuisine">Plat cuisiné</option>
        <option value="produit_deconge">Produit décongelé</option>
        <option value="produit_congele">Produit congelé</option>
      </select>
    </label>
    <label class="inv-filtre">
      <span>Tri</span>
      <select id="inv-filtre-tri">
        <option value="dlc_asc">DLC ↑ (urgent en premier)</option>
        <option value="dlc_desc">DLC ↓</option>
        <option value="nom_asc">Nom A→Z</option>
        <option value="nom_desc">Nom Z→A</option>
        <option value="origine_desc">Plus récent</option>
        <option value="origine_asc">Plus ancien</option>
      </select>
    </label>
    <label class="inv-filtre">
      <span>DLC max</span>
      <input type="date" id="inv-filtre-dlc-max">
    </label>
    <label class="inv-filtre inv-filtre--check">
      <input type="checkbox" id="inv-filtre-expires">
      <span>Inclure périmés</span>
    </label>
    <button type="button" id="inv-reset" class="inv-reset">Réinitialiser</button>
  </section>

  <!-- Liste FIFO -->
  <main class="inv-main" id="inv-main">
    <div id="inv-liste" class="inv-liste" aria-live="polite">
      <div class="inv-vide">Chargement…</div>
    </div>
  </main>

  <!-- Barre d'action flottante (mode gestion) -->
  <div id="inv-action-bar" class="inv-action-bar" hidden aria-live="polite">
    <span class="inv-action-sel" id="inv-action-sel">0 sélectionné(s)</span>
    <div class="inv-action-btns">
      <button type="button" id="inv-btn-modifier-sel" class="inv-btn-modifier" disabled>
        ✏️ Modifier
      </button>
      <button type="button" id="inv-btn-traiter-sel" class="inv-btn-traiter" disabled>
        🗑️ Traiter la sélection
      </button>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       Modal : Traitement en masse (suppression / devenir)
       Identique au batch DLC — utilise /api/dlc/devenir/batch
       ════════════════════════════════════════════════════════ -->
  <div class="inv-modal" id="inv-batch-modal" hidden role="dialog" aria-modal="true"
       aria-labelledby="inv-batch-titre">
    <div class="inv-modal-backdrop" id="inv-batch-backdrop"></div>
    <div class="inv-modal-panel">
      <header class="inv-modal-header">
        <h2 id="inv-batch-titre">Traitement des produits sélectionnés</h2>
        <button class="inv-modal-close" id="inv-batch-close" aria-label="Fermer">✕</button>
      </header>
      <div class="inv-modal-body">

        <div class="inv-batch-resume" id="inv-batch-resume">—</div>

        <div class="inv-batch-entete">
          <label class="inv-batch-tout-label">
            <input type="checkbox" id="inv-batch-tout" checked>
            Tout sélectionner
          </label>
          <span class="inv-batch-compteur" id="inv-batch-compteur">0 sélectionné(s)</span>
        </div>

        <div class="inv-batch-liste" id="inv-batch-liste"></div>

        <label class="inv-m-label" for="inv-batch-personnel">Prénom opérateur *</label>
        <select id="inv-batch-personnel" class="inv-m-select" required>
          <option value="">— Sélectionner —</option>
        </select>

        <label class="inv-m-label">Devenir appliqué à tous *</label>
        <div class="inv-m-statuts">
          <button class="inv-btn-statut" data-inv-statut="jete">🗑️ Jeté</button>
          <button class="inv-btn-statut" data-inv-statut="vendu">💰 Vendu</button>
          <button class="inv-btn-statut" data-inv-statut="consomme">✅ Consommé</button>
          <button class="inv-btn-statut" data-inv-statut="autre">❓ Autre</button>
        </div>

        <label class="inv-m-label" for="inv-batch-commentaire">Commentaire (optionnel)</label>
        <textarea id="inv-batch-commentaire" class="inv-m-textarea"
                  rows="2" placeholder="Raison commune, remarque…"></textarea>

        <button class="inv-m-valider" id="inv-batch-valider" disabled>
          Confirmer le traitement
        </button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════════════════
       Modal : Modification d'un produit (DLC / quantité)
       Le N° de lot est affiché en lecture seule — non modifiable
       ════════════════════════════════════════════════════════ -->
  <div class="inv-modal" id="inv-edit-modal" hidden role="dialog" aria-modal="true"
       aria-labelledby="inv-edit-titre">
    <div class="inv-modal-backdrop" id="inv-edit-backdrop"></div>
    <div class="inv-modal-panel inv-modal-panel--small">
      <header class="inv-modal-header">
        <h2 id="inv-edit-titre">Modifier le produit</h2>
        <button class="inv-modal-close" id="inv-edit-close" aria-label="Fermer">✕</button>
      </header>
      <div class="inv-modal-body">

        <div class="inv-edit-nom" id="inv-edit-nom"></div>

        <div class="inv-edit-lot-bloc">
          <span class="inv-edit-lot-label">N° Lot</span>
          <span class="inv-edit-lot-val" id="inv-edit-lot">—</span>
          <span class="inv-edit-lot-lock" title="Non modifiable">🔒</span>
        </div>

        <label class="inv-m-label" for="inv-edit-dlc">Date limite de consommation *</label>
        <input type="date" id="inv-edit-dlc" class="inv-m-input" required>

        <div id="inv-edit-qte-bloc">
          <label class="inv-m-label" for="inv-edit-qte">
            Quantité <span id="inv-edit-unite"></span>
          </label>
          <input type="number" id="inv-edit-qte" class="inv-m-input"
                 min="0" step="0.001" placeholder="Ex : 2.5">
        </div>

        <button class="inv-m-valider" id="inv-edit-valider">
          Enregistrer les modifications
        </button>

        <button type="button" class="inv-m-imprimer" id="inv-edit-imprimer">
          🖨️ Imprimer étiquette
        </button>
      </div>
    </div>
  </div>

  <!-- ── Gabarit étiquette inventaire (invisible à l'écran, imprimé via @media print) ── -->
  <div id="print-label-inv">
    <div id="pinv-tag" style="font-size:.8rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;text-align:center;border:1.5px solid black;border-radius:4px;padding:1mm 0;margin:0 0 1mm;" hidden>[—]</div>
    <div id="pinv-nom" style="font-size:.85rem;font-weight:900;text-transform:uppercase;line-height:1.1;margin:0;">—</div>
    <div id="pinv-lot" style="font-size:.75rem;font-weight:bold;line-height:1.1;margin-top:1mm;">N° Lot : —</div>
    <div id="pinv-dlc" style="font-size:.75rem;font-weight:bold;line-height:1.1;margin-top:1mm;">DLC : —</div>
    <div id="pinv-fab" style="font-size:.7rem;line-height:1.1;margin-top:1mm;" hidden>Fabriqué le —</div>
  </div>

  <script src="/static/js/inventaire.js"></script>
</body>
</html>
