<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>E-Learning HACCP — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/hub.css">
</head>
<body class="hub-body">

  <!-- ========================================================
       EN-TÊTE
  ========================================================= -->
  <header class="hub-header">
    <a href="/taches-hub.html" class="hub-btn-admin" aria-label="Retour aux tâches">← Tâches</a>
    <div class="hub-titre">E-LEARNING</div>
    <div id="hub-horloge" class="hub-horloge" aria-live="polite"></div>
  </header>

  <!-- ========================================================
       GRILLE — Documents de formation
  ========================================================= -->
  <main class="hub-grille elearning-grille" role="main" style="grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr;">

    <!-- ── Hygiène ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-hygiene"
       href="/elearning-hygiene.html"
       aria-label="Formation hygiène">
      <div class="hub-tuile-icone" aria-hidden="true">🧼</div>
      <div class="hub-tuile-titre">HYGIÈNE</div>
      <div class="hub-tuile-statut">Guide des bonnes pratiques</div>
    </a>

    <!-- ── Découpe ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-decoupe"
       href="/elearning-decoupe.html"
       aria-label="Formation découpe">
      <div class="hub-tuile-icone" aria-hidden="true">🔪</div>
      <div class="hub-tuile-titre">DÉCOUPE</div>
      <div class="hub-tuile-statut">Techniques & sécurité</div>
    </a>

    <!-- ── Tuto HACCP Monitor ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-tuto"
       href="/tutoriel-slideshow.html"
       aria-label="Tutoriel HACCP Monitor">
      <div class="hub-tuile-icone" aria-hidden="true">📋</div>
      <div class="hub-tuile-titre">TUTO HACCP MONITOR</div>
      <div class="hub-tuile-statut">Mode d'emploi pas à pas</div>
    </a>

  </main>

  <script>
    // Horloge
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() {
        el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      }
      tick();
      setInterval(tick, 10000);
    })();
  </script>
</body>
</html>
