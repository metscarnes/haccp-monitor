<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HACCP Monitor — Au Comptoir des Lilas</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <!-- Chart.js via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<header>
  <h1>HACCP — <span>Au Comptoir des Lilas</span></h1>
  <span id="statut-global" class="inconnu">Chargement…</span>
</header>

<div id="bandeau-alerte"></div>

<nav>
  <button class="active" data-vue="dashboard">Tableau de bord</button>
  <button data-vue="historique">Historique</button>
  <button data-vue="alertes">Alertes</button>
  <button data-vue="rapports">Rapports</button>
  <button data-vue="configuration">Configuration</button>
</nav>

<main>

  <!-- ===== VUE DASHBOARD ===== -->
  <div id="vue-dashboard">
    <div class="spinner" id="spinner-dashboard"></div>
  </div>

  <!-- ===== VUE HISTORIQUE ===== -->
  <div id="vue-historique">
    <div class="historique-controles">
      <div>
        <label>Enceinte</label>
        <select id="select-enceinte-historique"></select>
      </div>
      <div>
        <label>Période</label>
        <select id="select-periode">
          <option value="24h">24 heures</option>
          <option value="7j">7 jours</option>
          <option value="30j">30 jours</option>
          <option value="custom">Personnalisée</option>
        </select>
      </div>
      <div id="dates-custom" style="display:none; gap:.5rem; align-items:center">
        <input type="date" id="date-debut">
        <span>→</span>
        <input type="date" id="date-fin">
      </div>
      <button class="btn btn-primaire" id="btn-charger-historique">Afficher</button>
      <button class="btn btn-secondaire" id="btn-exporter-csv">Exporter CSV</button>
    </div>

    <div class="stats-bande" id="stats-bande"></div>

    <div class="chart-principal-wrap">
      <h3 id="titre-chart-historique">Température</h3>
      <div class="chart-canvas-wrap">
        <canvas id="chart-historique"></canvas>
      </div>
    </div>

    <div id="tableau-historique-wrap" style="display:none">
      <h3 class="tableau-titre" id="tableau-historique-titre"></h3>
      <div class="tableau-scroll">
        <table class="tableau-historique" id="tableau-historique"></table>
      </div>
    </div>
  </div>

  <!-- ===== VUE ALERTES ===== -->
  <div id="vue-alertes">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h2 style="font-size:1.05rem;">Alertes actives et historique</h2>
      <label style="font-size:.85rem; font-weight:600;">
        <input type="checkbox" id="toggle-historique-alertes" style="margin-right:.3rem;">
        Afficher les alertes fermées
      </label>
    </div>
    <div class="liste-alertes" id="liste-alertes">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- ===== VUE RAPPORTS ===== -->
  <div id="vue-rapports">
    <div class="rapport-form">
      <div>
        <label>Type de rapport</label>
        <select id="select-type-rapport">
          <option value="journalier">Journalier</option>
          <option value="mensuel">Mensuel</option>
        </select>
      </div>
      <div>
        <label>Date début</label>
        <input type="date" id="rapport-date-debut">
      </div>
      <div>
        <label>Date fin</label>
        <input type="date" id="rapport-date-fin">
      </div>
      <button class="btn btn-primaire" id="btn-generer-rapport">Générer le rapport</button>
    </div>
    <h3 style="margin-bottom:.75rem; font-size:.95rem; color:var(--brun);">Rapports générés</h3>
    <div class="liste-rapports" id="liste-rapports">
      <div class="spinner"></div>
    </div>
  </div>


  <!-- ===== VUE CONFIGURATION ===== -->
  <div id="vue-configuration">

    <div class="config-section">
      <h2 class="config-titre">Ajouter une enceinte</h2>
      <form id="form-enceinte" class="config-form">
        <div class="config-champ">
          <label for="enc-nom">Nom (friendly name) <span class="requis">*</span></label>
          <input type="text" id="enc-nom" placeholder="Ex : Frigo vitrine charcuterie" required>
        </div>

        <div class="config-champ">
          <label for="enc-type">Type <span class="requis">*</span></label>
          <select id="enc-type" required>
            <option value="">— Choisir un type —</option>
            <option value="refrigerateur">Réfrigérateur</option>
            <option value="congelateur">Congélateur</option>
            <option value="vitrine_refrigeree">Vitrine réfrigérée</option>
            <option value="chambre_froide_positive">Chambre froide positive</option>
            <option value="chambre_froide_negative">Chambre froide négative</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="config-champ">
          <label for="enc-sonde">ID sonde Zigbee</label>
          <input type="text" id="enc-sonde" placeholder="Ex : 0x00158d0001234567">
        </div>

        <div class="config-grille">
          <div class="config-champ">
            <label for="enc-temp-min">Seuil T° min (°C)</label>
            <input type="number" id="enc-temp-min" value="0" step="0.5">
          </div>
          <div class="config-champ">
            <label for="enc-temp-max">Seuil T° max (°C)</label>
            <input type="number" id="enc-temp-max" value="4" step="0.5">
          </div>
          <div class="config-champ">
            <label for="enc-hum-max">Seuil humidité max (%)</label>
            <input type="number" id="enc-hum-max" value="90" step="1" min="0" max="100">
          </div>
          <div class="config-champ">
            <label for="enc-delai">Délai alerte (min)</label>
            <input type="number" id="enc-delai" value="5" step="1" min="1">
          </div>
        </div>

        <div id="config-msg" class="config-msg" style="display:none"></div>

        <div class="config-actions">
          <button type="submit" class="btn btn-primaire" id="btn-sauver-enceinte">Ajouter l'enceinte</button>
          <button type="button" class="btn btn-secondaire" id="btn-annuler-enceinte" style="display:none">Annuler</button>
        </div>
      </form>
    </div>

    <div class="config-section">
      <h2 class="config-titre">Enceintes existantes</h2>
      <div id="liste-config-enceintes" class="liste-config-enceintes">
        <div class="spinner"></div>
      </div>
    </div>

  </div>

</main>

<script src="/static/js/charts.js"></script>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
