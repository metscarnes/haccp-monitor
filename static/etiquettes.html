<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Étiquettes DLC — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="etiq-body">

  <!-- ============================================================
       EN-TÊTE
  ============================================================= -->
  <header class="etiq-header">
    <a href="/hub.html" class="taches-btn-retour" aria-label="Retour accueil">← Hub</a>
    <div class="taches-header-centre">
      <div class="taches-titre">ÉTIQUETTES DLC</div>
    </div>
    <div id="etiq-horloge" class="taches-horloge" aria-live="polite"></div>
  </header>

  <!-- ============================================================
       CORPS — 2 colonnes
  ============================================================= -->
  <div class="etiq-layout">

    <!-- ── COLONNE GAUCHE : Formulaire ── -->
    <div class="etiq-col-form">
      <form id="etiq-form" class="etiq-form" novalidate autocomplete="off">

        <!-- Produit -->
        <section class="etiq-section">
          <div class="etiq-section-titre">1. Produit</div>

          <!-- Recherche dans le catalogue -->
          <div class="etiq-produit-recherche">
            <input id="etiq-produit-search" type="text" class="etiq-input"
                   placeholder="Rechercher dans le catalogue…"
                   autocomplete="off" list="etiq-datalist">
            <datalist id="etiq-datalist">
              <!-- Rempli par JS -->
            </datalist>
          </div>

          <!-- Résultat sélectionné -->
          <div id="etiq-produit-selectionne" class="etiq-produit-selectionne" hidden>
            <div class="etiq-produit-nom" id="etiq-produit-nom"></div>
            <div class="etiq-produit-meta" id="etiq-produit-meta"></div>
            <button type="button" id="etiq-produit-effacer" class="etiq-btn-clear" aria-label="Effacer">✕</button>
          </div>

          <!-- Saisie manuelle si pas dans le catalogue -->
          <div class="etiq-produit-manuel" id="etiq-produit-manuel-zone" hidden>
            <div class="etiq-champ">
              <label class="etiq-champ-label" for="etiq-nom-manuel">Nom du produit <span class="requis">*</span></label>
              <input id="etiq-nom-manuel" name="produit_nom" class="etiq-input" type="text"
                     placeholder="Ex : Merguez maison, Côte de bœuf…">
            </div>
            <div class="etiq-grille-2">
              <div class="etiq-champ">
                <label class="etiq-champ-label" for="etiq-dlc-jours">Durée DLC (jours) <span class="requis">*</span></label>
                <input id="etiq-dlc-jours" name="dlc_jours" class="etiq-input etiq-input--nb"
                       type="number" min="1" max="365" value="">
              </div>
              <div class="etiq-champ">
                <label class="etiq-champ-label" for="etiq-temp-cons">T° conservation</label>
                <input id="etiq-temp-cons" name="temperature_conservation" class="etiq-input"
                       type="text" placeholder="0°C à +4°C">
              </div>
            </div>
          </div>

          <button type="button" id="etiq-toggle-manuel" class="etiq-btn-lien">
            ＋ Produit absent du catalogue
          </button>
        </section>

        <!-- Type de date -->
        <section class="etiq-section">
          <div class="etiq-section-titre">2. Type de date</div>
          <div class="etiq-type-choix">
            <label class="etiq-type-label">
              <input type="radio" name="type_date" value="fabrication" checked>
              <span class="etiq-type-btn">
                <span class="etiq-type-icone">🔨</span>
                <span class="etiq-type-texte">Fabrication</span>
              </span>
            </label>
            <label class="etiq-type-label">
              <input type="radio" name="type_date" value="ouverture">
              <span class="etiq-type-btn">
                <span class="etiq-type-icone">📦</span>
                <span class="etiq-type-texte">Ouverture</span>
              </span>
            </label>
            <label class="etiq-type-label">
              <input type="radio" name="type_date" value="decongélation">
              <span class="etiq-type-btn">
                <span class="etiq-type-icone">❄</span>
                <span class="etiq-type-texte">Décongélation<br><small>J+3 réglementaire</small></span>
              </span>
            </label>
          </div>
        </section>

        <!-- Date de référence -->
        <section class="etiq-section">
          <div class="etiq-section-titre">3. Date de référence</div>
          <div class="etiq-grille-2">
            <div class="etiq-champ">
              <label class="etiq-champ-label" for="etiq-date-ref">Date <span class="requis">*</span></label>
              <input id="etiq-date-ref" name="date_etiquette" class="etiq-input etiq-input--date"
                     type="date" required>
            </div>
            <!-- DLC calculée -->
            <div class="etiq-champ">
              <div class="etiq-champ-label">DLC calculée</div>
              <div id="etiq-dlc-preview" class="etiq-dlc-preview">—</div>
            </div>
          </div>
        </section>

        <!-- Numéro de lot -->
        <section class="etiq-section">
          <div class="etiq-section-titre">4. Numéro de lot</div>
          <div class="etiq-type-choix etiq-type-choix--sm">
            <label class="etiq-type-label">
              <input type="radio" name="lot_type" value="interne" checked>
              <span class="etiq-type-btn">
                <span class="etiq-type-texte">Interne (auto)</span>
              </span>
            </label>
            <label class="etiq-type-label">
              <input type="radio" name="lot_type" value="fournisseur">
              <span class="etiq-type-btn">
                <span class="etiq-type-texte">Fournisseur</span>
              </span>
            </label>
          </div>
          <div id="etiq-lot-fourn-zone" class="etiq-champ" hidden>
            <label class="etiq-champ-label" for="etiq-lot-fourn">N° lot fournisseur <span class="requis">*</span></label>
            <input id="etiq-lot-fourn" name="numero_lot_fournisseur" class="etiq-input"
                   type="text" placeholder="Ex : FR-20260329-001">
          </div>
        </section>

        <!-- Opérateur + options -->
        <section class="etiq-section">
          <div class="etiq-section-titre">5. Opérateur</div>
          <div class="etiq-grille-2">
            <div class="etiq-champ">
              <label class="etiq-champ-label" for="etiq-operateur">Prénom <span class="requis">*</span></label>
              <select id="etiq-operateur" name="operateur" class="etiq-input" required>
                <option value="">— Sélectionner —</option>
                <!-- Rempli par JS -->
              </select>
            </div>
            <div class="etiq-champ">
              <label class="etiq-champ-label" for="etiq-info-comp">Info complémentaire</label>
              <input id="etiq-info-comp" name="info_complementaire" class="etiq-input"
                     type="text" placeholder="Ex : batch 2, promotion…">
            </div>
          </div>
        </section>

        <!-- Bouton générer -->
        <div class="etiq-actions">
          <button type="submit" id="etiq-btn-generer" class="btn-valider etiq-btn-generer">
            🖨 Générer &amp; imprimer
          </button>
        </div>

        <!-- Résultat -->
        <div id="etiq-resultat" class="etiq-resultat" hidden></div>
        <div id="etiq-erreur" class="etiq-erreur" hidden></div>

      </form>
    </div>

    <!-- ── COLONNE DROITE : Alertes + Historique ── -->
    <div class="etiq-col-info">

      <!-- Alertes DLC proches -->
      <div class="etiq-panel">
        <div class="etiq-panel-titre">
          ⚠ DLC proches (&lt; 2 jours)
          <button class="etiq-btn-refresh" id="etiq-refresh-alertes" title="Actualiser" aria-label="Actualiser alertes">↺</button>
        </div>
        <div id="etiq-alertes-liste" class="etiq-panel-corps">
          <div class="etiq-panel-vide">Chargement…</div>
        </div>
      </div>

      <!-- Dernières étiquettes générées aujourd'hui -->
      <div class="etiq-panel">
        <div class="etiq-panel-titre">
          📋 Étiquettes du jour
          <button class="etiq-btn-refresh" id="etiq-refresh-histo" title="Actualiser" aria-label="Actualiser historique">↺</button>
        </div>
        <div id="etiq-histo-liste" class="etiq-panel-corps">
          <div class="etiq-panel-vide">Chargement…</div>
        </div>
      </div>

    </div>

  </div><!-- /.etiq-layout -->

  <script src="/static/js/etiquettes.js"></script>
</body>
</html>
