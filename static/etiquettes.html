<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Fabrication — Mets Carnés</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/etiquettes.css">
  <style>
    /* ── Grille de tuiles — Étape 1 ── */
    .fab-filter-input {
      font-size: 1.1rem;
      padding: .85rem 1.1rem;
      border-radius: 10px;
      border: 1.5px solid #d8c9b2;
      background: #fff;
      width: 100%;
      box-sizing: border-box;
      min-height: 56px;
      font-family: inherit;
      color: #3D2008;
    }
    .fab-filter-input:focus {
      outline: none;
      border-color: #6B3A1F;
      box-shadow: 0 0 0 3px rgba(107,58,31,.12);
    }

    .recettes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 16px;
    }

    .recette-tuile {
      background: #FFFDF7;
      border: 1.5px solid #e8d9c4;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(61,32,8,.08);
      padding: 1.1rem .85rem 1rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      min-height: 110px;
      text-align: center;
      transition: border-color .15s, box-shadow .15s, transform .1s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .recette-tuile:hover {
      border-color: #6B3A1F;
      box-shadow: 0 4px 18px rgba(61,32,8,.16);
    }
    .recette-tuile:active {
      transform: scale(.96);
      background: #f5ede0;
    }

    .recette-tuile-img {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: #f0e8dc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .recette-tuile-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
    }

    .recette-tuile-nom {
      font-size: 1rem;
      font-weight: 800;
      color: #3D2008;
      line-height: 1.25;
    }

    .recette-tuile-dlc {
      font-size: .8rem;
      font-weight: 600;
      color: #6B3A1F;
      background: #f5ede0;
      padding: .15rem .55rem;
      border-radius: 20px;
    }

    .recettes-grid-vide {
      grid-column: 1 / -1;
      text-align: center;
      padding: 2rem 1rem;
      color: #888;
      font-style: italic;
      font-size: .95rem;
    }

    /* Step 1 inner : pas de max-width pour laisser la grille s'étaler */
    #fab-step-1 .fab-step-inner {
      max-width: none;
    }
  </style>
</head>
<body class="fab-body">

  <!-- ── En-tête ── -->
  <header class="fab-header">
    <button id="fab-btn-retour" class="fab-btn-retour" aria-label="Retour">←</button>
    <div class="fab-header-titre">FABRICATION</div>
    <div id="fab-horloge" class="fab-horloge" aria-live="polite"></div>
  </header>

  <!-- ── Barre de progression + bandeau recette ── -->
  <div class="fab-topbar">
    <nav class="fab-progress" aria-label="Étapes du wizard">
      <div class="fab-dot fab-dot--active" data-step="1"><span>1</span></div>
      <div class="fab-dot-line" data-line="1"></div>
      <div class="fab-dot" data-step="2"><span>2</span></div>
      <div class="fab-dot-line" data-line="2"></div>
      <div class="fab-dot" data-step="3"><span>3</span></div>
      <div class="fab-dot-line" data-line="3"></div>
      <div class="fab-dot" data-step="4"><span>4</span></div>
    </nav>
    <div class="fab-bandeau" id="fab-bandeau" hidden>
      <span id="fab-bandeau-nom" class="fab-bandeau-nom"></span>
      <span id="fab-bandeau-dlc" class="fab-bandeau-dlc"></span>
    </div>
  </div>

  <!-- ── Wizard ── -->
  <div class="fab-wizard-wrap" id="fab-wizard-wrap">

    <!-- Étape 1 : Choix de la recette -->
    <div class="fab-step fab-step--active" id="fab-step-1">
      <div class="fab-step-inner">
        <h2 class="fab-step-titre">Choisir une recette</h2>
        <input id="fab-recette-search" type="search" class="fab-filter-input"
               placeholder="Filtrer les recettes…" autocomplete="off" inputmode="text"
               aria-label="Filtrer les recettes">
        <div id="recettes-grid" class="recettes-grid" role="list"></div>
      </div>
    </div>

    <!-- Étape 2 : Calculateur de production -->
    <div class="fab-step fab-step--right" id="fab-step-2">
      <div class="fab-step-inner">
        <h2 class="fab-step-titre">Calculateur de production</h2>

        <!-- Cible de production -->
        <div class="fab-calc-target-wrap">
          <label class="fab-calc-label" for="fab-prod-ciblee">
            Production ciblée du jour
          </label>
          <div class="fab-calc-row">
            <input id="fab-prod-ciblee" type="number" inputmode="decimal"
                   min="0" step="0.1" class="fab-calc-input"
                   placeholder="0" aria-label="Production ciblée du jour">
            <span id="fab-prod-unite" class="fab-calc-unite">kg</span>
          </div>
          <div id="fab-calc-base-info" class="fab-calc-base-info"></div>
        </div>

        <!-- Liste ingrédients calculée (lecture seule) -->
        <div id="fab-ingredients-liste" class="fab-ingredients-liste"></div>

        <div class="fab-step-actions">
          <div id="fab-calc-erreur" class="fab-erreur" hidden></div>
          <button id="fab-btn-step2-next" class="fab-btn-primary">Suivant →</button>
        </div>
      </div>
    </div>

    <!-- Étape 3 : Traçabilité & Lots -->
    <div class="fab-step fab-step--right" id="fab-step-3">
      <div class="fab-step-inner">
        <h2 class="fab-step-titre">Traçabilité &amp; Lots</h2>
        <div id="fab-lots-liste" class="fab-lots-liste"></div>
        <div class="fab-step-actions">
          <button id="fab-btn-confirmer-lots" class="fab-btn-primary">Confirmer les lots →</button>
        </div>
      </div>
    </div>

    <!-- Étape 4 : Récapitulatif & Impression -->
    <div class="fab-step fab-step--right" id="fab-step-4">
      <div class="fab-step-inner">
        <h2 class="fab-step-titre">Récapitulatif</h2>
        <div id="fab-recap-content" class="fab-recap-content"></div>
        <div class="fab-step-actions fab-step-actions--col">
          <div class="fab-champ">
            <label class="fab-champ-label" for="fab-operateur">Opérateur <span class="fab-requis">*</span></label>
            <select id="fab-operateur" class="fab-input">
              <option value="">— Sélectionner —</option>
            </select>
          </div>
          <button id="fab-btn-generer" class="fab-btn-generer">🖨 Générer &amp; imprimer</button>
          <div id="fab-erreur" class="fab-erreur" hidden></div>
        </div>
      </div>
    </div>

  </div><!-- /.fab-wizard-wrap -->

  <!-- ── Modal substitution produit ── -->
  <div class="fab-modal-overlay" id="fab-sub-overlay" hidden>
    <div class="fab-modal">
      <div class="fab-modal-titre" id="fab-sub-titre">Choisir un substitut</div>
      <input type="text" id="fab-sub-search" class="fab-filter-input"
             style="margin-bottom:.75rem"
             placeholder="Rechercher dans le catalogue…"
             autocomplete="off" inputmode="text"
             aria-label="Rechercher un produit substitut">
      <div id="fab-sub-grid" class="fab-sub-grid"></div>
      <button class="fab-btn-secondary fab-sub-cancel-btn" id="fab-sub-cancel">✕ Annuler</button>
    </div>
  </div>

  <!-- ── Écran de succès (overlay) ── -->
  <div class="fab-succes" id="fab-succes" hidden>
    <div class="fab-succes-check" aria-hidden="true">✓</div>
    <div class="fab-succes-titre">Fabrication enregistrée !</div>
    <div class="fab-succes-lot" id="fab-succes-lot"></div>
    <div class="fab-succes-actions">
      <button id="fab-btn-meme-recette" class="fab-btn-secondary">Même recette</button>
      <button id="fab-btn-nouvelle-fab" class="fab-btn-primary">Nouvelle fabrication</button>
    </div>
  </div>

  <script src="/static/js/etiquettes.js"></script>
</body>
</html>
