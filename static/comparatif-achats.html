<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Comparateur fournisseurs — Au Comptoir des Lilas</title>
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/achats.css">
  <link rel="stylesheet" href="/static/css/pages/comparatif.css">
</head>
<body class="ach-body">
<script>
  // ── Garde d'accès : page réservée à l'administrateur ──────────
  (function(){
    var PAGE = '/comparatif-achats.html';
    function versLogin(){
      sessionStorage.setItem('auth_redirect', PAGE);
      window.location.replace('/login.html?admin=1');
    }
    var token = localStorage.getItem('admin_token');
    var exp   = Number(localStorage.getItem('admin_token_expires')||0);
    if(!token || Date.now() > exp){ versLogin(); return; }
    fetch('/api/auth/verify', { headers: { Authorization: 'Bearer ' + token } })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(d){ if(d.role !== 'admin'){ versLogin(); } })
      .catch(function(){ versLogin(); });
  })();
</script>

  <header class="ach-bar">
    <a href="/achats.html" class="ach-retour">← Achats</a>
    <div class="ach-bar-titre">⚖️ COMPARATEUR FOURNISSEURS</div>
    <div class="ach-bar-actions">
      <button class="ach-btn" id="btn-reorg-viande" title="Regrouper la viande par sous-famille">🥩 Réorganiser la viande</button>
      <button class="ach-btn ach-btn--primary" id="btn-nouveau-groupe">+ Nouveau groupe</button>
    </div>
  </header>

  <div class="cmp-toolbar">
    <div class="ach-filtre">
      <label>Groupe de comparaison</label>
      <select id="select-groupe">
        <option value="">— Choisir un groupe —</option>
      </select>
    </div>
    <button class="ach-btn" id="btn-groupe-suivant" style="display:none;" title="Groupe suivant">Suivant →</button>
    <button class="ach-btn" id="btn-renommer" style="display:none;">✎ Renommer</button>
    <button class="ach-btn ach-btn--danger" id="btn-supprimer-groupe" style="display:none;">🗑 Supprimer</button>
    <div class="cmp-toolbar-right">
      <button class="ach-btn ach-btn--primary" id="btn-ajouter-ligne" style="display:none;">+ Ajouter un article</button>
    </div>
  </div>

  <!-- Badge : produits de vente associés dont la marge est incalculable (info manquante) -->
  <div id="badge-marge-ko" class="cmp-badge-non-groupes cmp-badge-alerte" style="display:none;"
       title="Voir les marges bloquées">
    <span>📊</span>
    <span id="badge-marge-ko-texte"></span>
    <button class="ach-btn" id="btn-voir-marge-ko">Voir la liste</button>
  </div>

  <!-- Badge : produits de vente jamais reliés à un groupe (couverture catalogue) -->
  <div id="badge-ventes-non-reliees" class="cmp-badge-non-groupes" style="display:none;"
       title="Voir les produits de vente sans suivi de marge">
    <span>🏷️</span>
    <span id="badge-ventes-non-reliees-texte"></span>
    <button class="ach-btn" id="btn-voir-ventes-non-reliees">Voir la liste</button>
  </div>

  <!-- Bande marge : association produit de vente + marge sur la ligne de référence -->
  <div id="cmp-marge" class="cmp-marge" style="display:none;"></div>

  <!-- Zone du VS -->
  <div id="cmp-vs" class="cmp-vs">
    <div class="cmp-empty" id="cmp-empty">
      Sélectionnez un groupe, ou créez-en un pour commencer la comparaison.
    </div>
  </div>

  <!-- Panneau de suggestions / recherche d'articles à ajouter -->
  <div id="cmp-panneau" class="cmp-panneau" style="display:none;">
    <div class="cmp-panneau-box">
      <div class="cmp-panneau-head">
        <strong>Ajouter un article au groupe</strong>
        <button class="ach-btn" id="btn-fermer-panneau">✕</button>
      </div>
      <div class="cmp-panneau-search">
        <input type="search" id="cmp-search" placeholder="Rechercher un article (code ou désignation)…">
      </div>
      <div class="cmp-suggestions-titre" id="cmp-suggestions-titre" style="display:none;">
        Suggestions (même sous-famille, par proximité)
      </div>
      <div id="cmp-resultats" class="cmp-resultats"></div>
    </div>
  </div>

  <!-- Modale « Marges incalculables » : groupes associés à un produit de vente où il manque une info -->
  <div id="cmp-marge-ko" class="cmp-panneau" style="display:none;">
    <div class="cmp-panneau-box cmp-panneau-box--large">
      <div class="cmp-panneau-head">
        <strong>📊 Marges en attente d'une information</strong>
        <button class="ach-btn" id="btn-fermer-marge-ko">✕</button>
      </div>
      <div class="cmp-proposer-info" id="cmp-marge-ko-info"></div>
      <div id="cmp-marge-ko-liste" class="cmp-resultats"></div>
    </div>
  </div>

  <!-- Modale « Produits de vente non reliés » : couverture catalogue -->
  <div id="cmp-non-reliees" class="cmp-panneau" style="display:none;">
    <div class="cmp-panneau-box cmp-panneau-box--large">
      <div class="cmp-panneau-head">
        <strong>🏷️ Produits de vente sans suivi de marge</strong>
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="ach-btn ach-btn--primary" id="btn-creer-tous-groupes">⚡ Créer tous les groupes</button>
          <button class="ach-btn" id="btn-fermer-non-reliees">✕</button>
        </div>
      </div>
      <div class="cmp-proposer-info" id="cmp-non-reliees-info"></div>
      <div id="cmp-non-reliees-liste" class="cmp-resultats"></div>
    </div>
  </div>

  <script src="/static/js/core/familles.js"></script>
  <script src="/static/js/achats/comparatif-achats.js"></script>
</body>
</html>
