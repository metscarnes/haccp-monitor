<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Quiz Hygiène — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/hub.css">

  <!-- Préchargement des 10 miniatures (mêmes images que les vidéos / modules) -->
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/1%20HACCP.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/2%20PND.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/3%20VESTIAIRE.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/4%20RECEPTION.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/5%20TEMPERATURES.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/6%20TRACABILITE.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/7%20STOCK%20ET%20FABRICATION.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/8%20CUISSON.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/9%20REFROIDISSEMENT.png">
  <link rel="preload" as="image" href="/static/docs/Modules%20hygiene/10%20STOCKAGE%20ET%20ALLERGENES.png">
  <style>
    .hub-body { background: #EDE0C8; }

    .quiz-grille {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 1rem;
      align-content: start;
    }

    @media (min-width: 600px)  { .quiz-grille { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px)  { .quiz-grille { grid-template-columns: repeat(5, 1fr); } }

    /* ── Carte Quiz ── */
    .quiz-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      box-shadow: 0 2px 10px rgba(61,32,8,.10), 0 0 0 1.5px rgba(61,32,8,.06);
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--color-text);
      overflow: hidden;
      position: relative;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .quiz-card:hover,
    .quiz-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(61,32,8,.18), 0 0 0 2px var(--color-secondary);
      outline: none;
    }
    .quiz-card:active { transform: scale(0.97); }

    /* Vignette de la carte (image reprise des vidéos) */
    .quiz-card-head {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #1a1410;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .quiz-card-head img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.22s ease;
    }
    .quiz-card:hover .quiz-card-head img { transform: scale(1.05); }

    /* Dégradé bas permanent (lisibilité badges) */
    .quiz-card-head::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,.0) 40%, rgba(0,0,0,.50) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* Pastille "Quiz" au centre de la vignette */
    .quiz-card-emoji {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      opacity: 0.55;
      transition: opacity 0.16s;
    }
    .quiz-card-emoji::after {
      content: '📝';
      background: rgba(255,255,255,.92);
      border-radius: 50%;
      width: 2.6rem;
      height: 2.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 3px 14px rgba(0,0,0,.35);
      transition: transform 0.16s;
    }
    .quiz-card:hover .quiz-card-emoji        { opacity: 1; }
    .quiz-card:hover .quiz-card-emoji::after { transform: scale(1.12); }

    .quiz-card-num {
      position: absolute;
      top: 0.45rem;
      left: 0.45rem;
      background: var(--color-secondary);
      color: var(--color-text);
      font-size: 0.66rem;
      font-weight: 800;
      border-radius: 50%;
      width: 1.45rem;
      height: 1.45rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 5px rgba(0,0,0,.45);
      z-index: 3;
    }

    /* Infos */
    .quiz-card-info {
      padding: 0.5rem 0.6rem 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }
    .quiz-card-module {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-secondary);
    }
    .quiz-card-titre {
      font-size: clamp(0.72rem, 1.8vw, 0.84rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.2;
      color: var(--color-text);
    }
    .quiz-card-sub {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--color-secondary);
      opacity: 0.85;
      margin-top: 0.05rem;
    }

    /* Carte verrouillée (quiz pas encore disponible) */
    .quiz-card--lock {
      pointer-events: none;
      opacity: 0.5;
      filter: grayscale(0.4);
    }
    .quiz-card--lock .quiz-card-head {
      background: linear-gradient(150deg, #9c8a76 0%, #6f6253 100%);
    }
  </style>
</head>
<body class="hub-body">

  <header class="hub-header">
    <a href="/elearning-hygiene.html" class="hub-btn-admin" aria-label="Retour à Hygiène">← Hygiène</a>
    <div class="hub-titre">QUIZ HYGIÈNE</div>
    <div id="hub-horloge" class="hub-horloge" aria-live="polite"></div>
  </header>

  <main class="quiz-grille" role="main" id="quiz-grille">
    <!-- Cartes injectées par JS -->
  </main>

  <script>
    // Liste des 10 quiz (titres alignés sur les modules de cours).
    // disponible:true => quiz jouable ; sinon verrouillé "Bientôt".
    const IMG = '/static/docs/Modules%20hygiene/';
    const QUIZ = [
      { id: 1,  titre: 'HACCP',           img: IMG + '1%20HACCP.png',                    disponible: true  },
      { id: 2,  titre: 'LE PND',          img: IMG + '2%20PND.png',                      disponible: false },
      { id: 3,  titre: 'VESTIAIRE',       img: IMG + '3%20VESTIAIRE.png',                disponible: false },
      { id: 4,  titre: 'RÉCEPTION',       img: IMG + '4%20RECEPTION.png',                disponible: false },
      { id: 5,  titre: 'TEMPÉRATURES',    img: IMG + '5%20TEMPERATURES.png',             disponible: false },
      { id: 6,  titre: 'TRAÇABILITÉ',     img: IMG + '6%20TRACABILITE.png',              disponible: false },
      { id: 7,  titre: 'FABRICATION',     img: IMG + '7%20STOCK%20ET%20FABRICATION.png', disponible: false },
      { id: 8,  titre: 'CUISSON',         img: IMG + '8%20CUISSON.png',                  disponible: false },
      { id: 9,  titre: 'REFROIDISSEMENT', img: IMG + '9%20REFROIDISSEMENT.png',          disponible: false },
      { id: 10, titre: 'ALLERGÈNES',      img: IMG + '10%20STOCKAGE%20ET%20ALLERGENES.png', disponible: false },
    ];

    const grille = document.getElementById('quiz-grille');

    function carteHTML(q) {
      const lock = q.disponible ? '' : ' quiz-card--lock';
      const tag = q.disponible ? 'a' : 'div';
      const href = q.disponible
        ? ` href="/quiz.html?quiz=${q.id}"`
        : '';
      const sub = q.disponible ? '📝 10 questions' : '🔒 Bientôt';
      return `
        <${tag} class="quiz-card${lock}"${href} aria-label="Quiz ${q.id} — ${q.titre}">
          <div class="quiz-card-head">
            <span class="quiz-card-num">${q.id}</span>
            <img src="${q.img}" alt="" loading="eager" decoding="async" fetchpriority="high">
            <span class="quiz-card-emoji" aria-hidden="true"></span>
          </div>
          <div class="quiz-card-info">
            <span class="quiz-card-module">QUIZ ${q.id}</span>
            <span class="quiz-card-titre">${q.titre}</span>
            <span class="quiz-card-sub">${sub}</span>
          </div>
        </${tag}>`;
    }

    grille.innerHTML = QUIZ.map(carteHTML).join('');

    // Horloge
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() { el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
      tick(); setInterval(tick, 10000);
    })();
  </script>
</body>
</html>
