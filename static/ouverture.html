<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Ouverture sous-vide — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/ouverture.css">
  <style>
    /* ── Gabarit impression thermique Brother 62mm — étiquette ouverture ── */
    #print-label-ouverture { display: none; }
    @media print {
      @page { size: 62mm auto; margin: 0; }
      html, body { margin: 0; padding: 0; height: auto; background: white; }
      body > *:not(#print-label-ouverture) { display: none !important; }
      #print-label-ouverture {
        display: block;
        position: static;
        width: 100%;
        box-sizing: border-box;
        padding: 2mm;
        margin: 0;
        color: black;
        background: white;
        font-family: sans-serif;
        page-break-inside: avoid;
        break-inside: avoid;
      }
    }
  </style>
</head>
<body class="ouv-body">
<script src="/static/js/core/guard.js"></script>

  <!-- ============================================================
       EN-TÊTE
  ============================================================= -->
  <header class="ouv-header">
    <button class="ouv-btn-retour" id="ouv-btn-retour" aria-label="Retour">← Retour</button>
    <div class="ouv-header-titre">OUVERTURE SOUS-VIDE</div>
    <div class="ouv-horloge" id="ouv-horloge" aria-live="polite"></div>
  </header>

  <!-- ============================================================
       BARRE DE PROGRESSION (3 dots)
  ============================================================= -->
  <div class="ouv-progress" id="ouv-progress" aria-hidden="true">
    <div class="ouv-dot actif" id="dot-1"></div>
    <div class="ouv-dot"       id="dot-2"></div>
    <div class="ouv-dot"       id="dot-3"></div>
  </div>

  <!-- ============================================================
       BANDEAU OPÉRATEUR — visible aux étapes 2 et 3
  ============================================================= -->
  <div class="ouv-bandeau-produit" id="ouv-bandeau-produit"
       hidden aria-live="polite"></div>

  <!-- ============================================================
       CONTENU PRINCIPAL — Wizard
  ============================================================= -->
  <main class="ouv-main" role="main">

    <!-- ── ÉTAPE 1 : Opérateur ── -->
    <section class="ouv-step actif" id="ouv-step-1"
             aria-label="Étape 1 — Qui ouvre ?">

      <div class="ouv-section-titre">Qui ouvre ?</div>

      <div class="ouv-personnel-grille" id="ouv-personnel-grille"
           role="group" aria-label="Sélection opérateur">
        <!-- Boutons injectés par JS -->
      </div>

    </section>

    <!-- ── ÉTAPE 2 : Photo ── -->
    <section class="ouv-step" id="ouv-step-2"
             aria-label="Étape 2 — Prendre la photo">

      <div class="ouv-photo-apercu" id="ouv-apercu" hidden>
        <img id="ouv-photo-vignette" class="ouv-photo-vignette" alt="Aperçu de la photo">
        <div class="ouv-photo-ok">✓ Photo prise</div>
      </div>

      <button class="ouv-btn-camera" id="ouv-btn-camera"
              aria-label="Prendre la photo avec la caméra">
        <span class="ouv-btn-camera-icone" aria-hidden="true">📷</span>
        <span class="ouv-btn-camera-label">PRENDRE LA PHOTO</span>
      </button>

      <input type="file" accept="image/*" capture
             id="ouv-input-photo" hidden aria-hidden="true">
    </section>

    <!-- ── ÉTAPE 3 : Choix produit ── -->
    <section class="ouv-step" id="ouv-step-3"
             aria-label="Étape 3 — Choisir le produit">

      <div class="ouv-search-wrap">
        <span class="ouv-search-icon" aria-hidden="true">🔍</span>
        <input type="search" class="ouv-search" id="ouv-search"
               placeholder="Rechercher un produit…"
               autocomplete="off" inputmode="search"
               aria-label="Rechercher un produit">
      </div>

      <div class="ouv-section-label" id="ouv-section-label">Produits en stock</div>

      <div class="ouv-produits-liste" id="ouv-produits-liste"
           role="list" aria-label="Liste des produits">
        <div class="ouv-liste-vide" id="ouv-liste-vide">Chargement…</div>
      </div>

      <div class="ouv-erreur" id="ouv-erreur-3" hidden role="alert">
        Veuillez sélectionner un produit.
      </div>

      <button class="ouv-btn-enregistrer" id="ouv-btn-enregistrer"
              disabled aria-disabled="true">
        ✔&nbsp;Enregistrer l'ouverture
      </button>

    </section>

    <!-- ── CONFIRMATION ── -->
    <section class="ouv-step" id="ouv-step-confirm"
             aria-label="Ouverture enregistrée" aria-live="assertive">

      <div class="ouv-check" aria-hidden="true">✅</div>
      <div class="ouv-confirm-titre">Ouverture enregistrée</div>
      <div class="ouv-confirm-detail" id="ouv-confirm-detail"></div>

      <div class="ouv-confirm-actions">
        <button class="ouv-btn-imprimer" id="ouv-btn-imprimer">
          🖨️&nbsp;Imprimer l'étiquette
        </button>
        <button class="ouv-btn-meme-produit" id="ouv-btn-meme-produit">
          ↩&nbsp;Même produit
        </button>
        <button class="ouv-btn-nouvelle" id="ouv-btn-nouvelle">
          ✦&nbsp;Nouvelle ouverture
        </button>
      </div>

      <div class="ouv-confirm-countdown" id="ouv-confirm-countdown"
           aria-live="polite"></div>

    </section>

  </main>

  <!-- ── Gabarit ticket thermique (invisible à l'écran, imprimé via @media print) ── -->
  <div id="print-label-ouverture">
    <div style="text-align:center;border:2px solid black;border-radius:6px;padding:4px;margin-bottom:6px;">
      <div id="pol-tag" style="font-size:1.1rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;">[OUVERT]</div>
    </div>
    <h1 id="pol-nom" style="font-size:1.1rem;font-weight:900;margin:0 0 6px;text-transform:uppercase;line-height:1.1;text-align:center;">PRODUIT</h1>
    <div style="border:2px solid black;border-radius:6px;padding:4px;text-align:center;margin-bottom:6px;">
      <div style="font-size:.7rem;font-weight:bold;text-transform:uppercase;">DLC :</div>
      <div id="pol-dlc" style="font-size:1.4rem;font-weight:900;color:red;">--/--/--</div>
    </div>
    <div id="pol-lot" style="font-size:.85rem;font-weight:bold;text-align:center;margin-bottom:6px;padding:2px;border:1px dashed black;">Lot : —</div>
    <div id="pol-action" style="font-size:.75rem;text-align:center;margin-bottom:4px;">Ouvert le — à —</div>
    <div id="pol-meta" style="font-size:.7rem;text-align:center;border-top:1px solid black;padding-top:2px;">Par : —</div>
  </div>

  <script src="/static/js/core/camera.js"></script>
  <script src="/static/js/ouverture.js"></script>
</body>
</html>
