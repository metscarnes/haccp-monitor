<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Actions correctives — Plan HACCP</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/hub.css">
</head>
<body class="hub-body">
<script src="/static/js/core/guard.js"></script>

  <header class="hub-header">
    <a href="/pms-plan-haccp.html" class="hub-btn-admin" aria-label="Retour au Plan HACCP">← Plan HACCP</a>
    <div class="hub-titre">ACTIONS CORRECTIVES</div>
    <div id="hub-horloge" class="hub-horloge" aria-live="polite"></div>
  </header>

  <main class="hub-grille" role="main" style="grid-template-columns: repeat(3, 1fr);">

    <!-- ── PCR01 ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-pcr01"
       href="/pms-pdf-viewer.html?titre=PCR01&retour=%2Fpms-plan-haccp-actions.html&dossier=Le+Plan+HACCP%2FActions+correctives%2FPCR01"
       aria-label="PCR01">
      <div class="hub-tuile-icone" aria-hidden="true">📑</div>
      <div class="hub-tuile-titre">PCR01</div>
      <div class="hub-tuile-statut">Réception · Process · Non-conformité</div>
    </a>

    <!-- ── TIAC ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-tiac"
       href="/pms-pdf-viewer.html?titre=TIAC&retour=%2Fpms-plan-haccp-actions.html&dossier=Le+Plan+HACCP%2FActions+correctives%2FTIAC"
       aria-label="TIAC — Toxi-infection alimentaire collective">
      <div class="hub-tuile-icone" aria-hidden="true">🚨</div>
      <div class="hub-tuile-titre">TIAC</div>
      <div class="hub-tuile-statut">Procédure & déclaration</div>
    </a>

    <!-- ── Cuisson ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-cuisson"
       href="/pms-pdf-viewer.html?titre=Cuisson&retour=%2Fpms-plan-haccp-actions.html&fichier=Le+Plan+HACCP%2FActions+correctives%2FCUISSON.pdf"
       aria-label="Cuisson">
      <div class="hub-tuile-icone" aria-hidden="true">🔥</div>
      <div class="hub-tuile-titre">CUISSON</div>
      <div class="hub-tuile-statut">Procédure de cuisson</div>
    </a>

    <!-- ── Lutte contre les nuisibles ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-nuisibles"
       href="/pms-pdf-viewer.html?titre=Lutte+contre+les+nuisibles&retour=%2Fpms-plan-haccp-actions.html&fichier=Le+Plan+HACCP%2FActions+correctives%2FLUTTE+CONTRE+LES+NUISIBLES.pdf"
       aria-label="Lutte contre les nuisibles">
      <div class="hub-tuile-icone" aria-hidden="true">🐛</div>
      <div class="hub-tuile-titre">NUISIBLES</div>
      <div class="hub-tuile-statut">Lutte contre les nuisibles</div>
    </a>

    <!-- ── Refroidissement ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-refroidissement"
       href="/pms-pdf-viewer.html?titre=Refroidissement&retour=%2Fpms-plan-haccp-actions.html&fichier=Le+Plan+HACCP%2FActions+correctives%2FREFROIDISSEMENT.pdf"
       aria-label="Refroidissement">
      <div class="hub-tuile-icone" aria-hidden="true">❄️</div>
      <div class="hub-tuile-titre">REFROIDISSEMENT</div>
      <div class="hub-tuile-statut">Procédure de refroidissement</div>
    </a>

    <!-- ── Historique des actions correctives ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-historique-ac"
       href="/historique.html?cat=ac"
       aria-label="Historique des actions correctives">
      <div class="hub-tuile-icone" aria-hidden="true">📚</div>
      <div class="hub-tuile-titre">HISTORIQUE</div>
      <div class="hub-tuile-statut">Actions correctives réalisées</div>
    </a>

  </main>

  <script>
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() {
        el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      }
      tick();
      setInterval(tick, 10000);
    })();
  </script>
</body>
</html>
