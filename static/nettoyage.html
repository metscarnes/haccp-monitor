<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Plan de Nettoyage — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/pages/nettoyage.css">
</head>
<body class="nett-body">

  <!-- ── BARRE DE CONTRÔLE (sticky) ── -->
  <header class="nett-bar">
    <a href="/taches-hub.html" class="nett-retour">← Tâches</a>
    <div class="nett-bar-date" id="display-date"></div>
    <div class="nett-bar-actions">
      <button id="btn-gerer" class="nett-btn-gerer">⚙ Tâches</button>
      <a href="/historique-enregistrement.html#nettoyage" class="nett-btn-historique">📋 Historique</a>
      <select id="operator-select" class="nett-select">
        <option value="">👤 Opérateur…</option>
        <!-- injecté dynamiquement par nettoyage.js via /api/admin/personnel -->
      </select>
      <button id="btn-valider" class="nett-btn-valider">✅ VALIDER LE NETTOYAGE</button>
    </div>
  </header>

  <!-- ── TABLEAU ── -->
  <div class="nett-table-wrap">
    <table class="nett-table" id="planning-table">
      <thead>
        <tr>
          <th class="nett-th-secteur">Secteur</th>
          <th class="nett-th-quoi">Quoi</th>
          <th class="nett-th-quand">Quand</th>
          <th class="nett-th-comment">Produit</th>
          <th class="nett-th-day" data-day="1">Lun</th>
          <th class="nett-th-day" data-day="2">Mar</th>
          <th class="nett-th-day" data-day="3">Mer</th>
          <th class="nett-th-day" data-day="4">Jeu</th>
          <th class="nett-th-day" data-day="5">Ven</th>
          <th class="nett-th-day" data-day="6">Sam</th>
          <th class="nett-th-day" data-day="0">Dim</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>

  <!-- Toast -->
  <div id="nett-toast" class="nett-toast" role="status" aria-live="polite"></div>

  <!-- ── MODALE GESTION DES TÂCHES ── -->
  <div id="modal-gerer" class="nett-modal-overlay" hidden>
    <div class="nett-modal">
      <div class="nett-modal-header">
        <h2 class="nett-modal-title">⚙ Gérer les tâches de nettoyage</h2>
        <button id="btn-modal-close" class="nett-modal-close">✕</button>
      </div>

      <!-- Liste des tâches existantes -->
      <div class="nett-modal-body" id="modal-liste"></div>

      <!-- Formulaire d'ajout / édition -->
      <div class="nett-modal-form">
        <h3 class="nett-modal-form-title" id="form-title">+ Ajouter une tâche</h3>
        <input type="hidden" id="form-id">
        <div class="nett-form-grid">
          <label>Zone
            <input type="text" id="form-zone" placeholder="ex : CUISINE" class="nett-form-input">
          </label>
          <label>Tâche
            <input type="text" id="form-nom" placeholder="ex : SOL / SIPHON" class="nett-form-input">
          </label>
          <label>Fréquence
            <select id="form-freq" class="nett-form-input">
              <option value="Quotidien">Quotidien</option>
              <option value="Hebdomadaire">Hebdomadaire</option>
            </select>
          </label>
          <label>Produit
            <input type="text" id="form-produit" placeholder="ex : KING FLASH GERM" class="nett-form-input">
          </label>
        </div>
        <div class="nett-form-actions">
          <button id="btn-form-cancel" class="nett-btn-annuler" hidden>Annuler</button>
          <button id="btn-form-save" class="nett-btn-sauver">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/nettoyage.js"></script>
</body>
</html>
