<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <style>
    /* ── Grille vidéos ── */
    .videos-grille {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      padding: 0.75rem;
      align-content: start;
    }

    @media (min-width: 768px) and (orientation: landscape) {
      .videos-grille {
        grid-template-columns: repeat(5, 1fr);
        align-content: start;
        overflow-y: hidden;
      }
      /* Hauteur calculée : (viewport - header - padding×2 - gap) / 2 rangées */
      .video-tuile {
        aspect-ratio: unset;
        height: calc((100dvh - 64px - 2.25rem) / 2);
      }
    }

    /* ── Tuile miniature ── */
    .video-tuile {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      border: 3px solid var(--color-ok);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 16 / 9;
      padding: 0;
      display: block;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .video-tuile:active {
      transform: scale(0.96);
      box-shadow: 0 1px 8px rgba(61,32,8,.08);
    }

    .video-tuile-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: calc(var(--radius) - 3px);
    }

    /* Fallback fond si image absente */
    .video-tuile-thumb-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2rem, 6vw, 3rem);
      background: linear-gradient(135deg, var(--color-secondary) 0%, var(--color-text) 100%);
      border-radius: calc(var(--radius) - 3px);
    }

    .video-tuile-num {
      position: absolute;
      top: 0.4rem;
      left: 0.45rem;
      font-size: 0.72rem;
      font-weight: 800;
      background: var(--color-ok);
      color: #fff;
      border-radius: 50%;
      width: 1.5rem;
      height: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,.35);
      z-index: 2;
    }

    /* Icône play au centre */
    .video-tuile-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      color: rgba(255,255,255,.9);
      text-shadow: 0 2px 8px rgba(0,0,0,.6);
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .video-tuile:hover .video-tuile-play,
    .video-tuile:focus-visible .video-tuile-play {
      opacity: 1;
    }

    /* Bandeau titre en bas */
    .video-tuile-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.72));
      padding: 0.9rem 0.5rem 0.4rem;
      border-radius: 0 0 calc(var(--radius) - 3px) calc(var(--radius) - 3px);
      z-index: 2;
    }

    .video-tuile-nom {
      color: #fff;
      font-size: clamp(0.58rem, 1.5vw, 0.76rem);
      font-weight: 800;
      letter-spacing: 0.05em;
      text-align: center;
      display: block;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }

    /* ── Modal lecteur vidéo ── */
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      animation: modal-fadein 0.15s ease-out;
    }

    .video-modal[hidden] { display: none; }

    @keyframes modal-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .video-modal-box {
      background: var(--color-bg, #fff);
      color: var(--color-text);
      width: 100%;
      max-width: 860px;
      max-height: 94dvh;
      border-radius: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: modal-slidein 0.18s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes modal-slidein {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .video-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: var(--color-text);
      color: var(--color-bg);
      border-radius: 14px 14px 0 0;
      flex-shrink: 0;
    }

    .video-modal-titre {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .video-modal-fermer {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.30);
      color: var(--color-bg);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .video-modal-fermer:hover,
    .video-modal-fermer:active {
      background: rgba(255,255,255,.28);
    }

    .video-player-wrap {
      padding: 0.75rem 0.75rem 0;
      flex-shrink: 0;
    }

    .video-player-wrap video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: block;
      max-height: 45dvh;
    }

    .video-pdf-btn {
      margin: 0.75rem 0.75rem 0;
      padding: 0.75rem 1.25rem;
      background: var(--color-card);
      border: 2px solid var(--color-secondary);
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.15s, border-color 0.15s;
      color: var(--color-text);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .video-pdf-btn:hover,
    .video-pdf-btn:active {
      background: var(--color-secondary);
      color: var(--color-bg);
      border-color: var(--color-secondary);
    }

    .video-pdf-btn--actif {
      background: var(--color-ok);
      border-color: var(--color-ok);
      color: #fff;
    }

    .video-pdf-btn--actif:hover,
    .video-pdf-btn--actif:active {
      background: var(--color-ok);
    }

    .video-pdf-zone {
      margin: 0.75rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.1);
      flex-shrink: 0;
    }

    .video-pdf-zone[hidden] { display: none; }

    .video-pdf-zone iframe {
      width: 100%;
      height: 42dvh;
      display: block;
      border: none;
    }
  </style>
</head>

  <!-- ========================================================
       MODAL — Lecteur vidéo + PDF optionnel
  ========================================================= -->
  <div id="video-modal" class="video-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-titre-text">

    <div class="video-modal-box">

      <div class="video-modal-header">
        <span class="video-modal-titre" id="modal-titre-text"></span>
        <button class="video-modal-fermer" id="btn-modal-fermer" aria-label="Fermer le lecteur">✕</button>
      </div>

      <div class="video-player-wrap">
        <video id="video-player" controls playsinline preload="metadata">
          <source id="video-src" src="" type="video/mp4">
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
      </div>

      <button class="video-pdf-btn" id="btn-pdf-toggle" aria-expanded="false" aria-controls="video-pdf-zone">
        <span>📄</span>
        <span id="btn-pdf-label">Voir le support de cours (PDF)</span>
      </button>

      <div class="video-pdf-zone" id="video-pdf-zone" hidden>
        <iframe id="pdf-frame" src="" title="Support de cours PDF" loading="lazy"></iframe>
      </div>

    </div>
  </div>

  <script>
    // ── Horloge ──
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() {
        el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      }
      tick();
      setInterval(tick, 10000);
    })();

    // ── Lecteur vidéo ──
    (function () {
      const modal     = document.getElementById('video-modal');
      const titreEl   = document.getElementById('modal-titre-text');
      const videoEl   = document.getElementById('video-player');
      const srcEl     = document.getElementById('video-src');
      const btnFermer = document.getElementById('btn-modal-fermer');
      const btnPdf    = document.getElementById('btn-pdf-toggle');
      const btnPdfLbl = document.getElementById('btn-pdf-label');
      const pdfZone   = document.getElementById('video-pdf-zone');
      const pdfFrame  = document.getElementById('pdf-frame');

      let pdfOuvert = false;
      let pdfUrl    = '';

      document.getElementById('videos-grille').addEventListener('click', function (e) {
        const tuile = e.target.closest('.video-tuile');
        if (!tuile) return;

        titreEl.textContent = tuile.dataset.titre || '';
        pdfUrl              = tuile.dataset.pdf   || '';
        srcEl.src           = tuile.dataset.video || '';

        pdfOuvert = false;
        pdfZone.hidden = true;
        pdfFrame.src   = '';
        btnPdf.setAttribute('aria-expanded', 'false');
        btnPdf.classList.remove('video-pdf-btn--actif');
        btnPdfLbl.textContent = 'Voir le support de cours (PDF)';

        videoEl.load();
        modal.hidden = false;
        document.body.style.overflow = 'hidden';
        videoEl.play().catch(function () {});
      });

      function fermerModal() {
        videoEl.pause();
        srcEl.src    = '';
        pdfFrame.src = '';
        modal.hidden = true;
        document.body.style.overflow = '';
      }

      btnFermer.addEventListener('click', fermerModal);
      modal.addEventListener('click', function (e) { if (e.target === modal) fermerModal(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !modal.hidden) fermerModal(); });

      btnPdf.addEventListener('click', function () {
        pdfOuvert = !pdfOuvert;
        if (pdfOuvert) {
          if (!pdfFrame.src || pdfFrame.src === window.location.href) pdfFrame.src = pdfUrl;
          pdfZone.hidden = false;
          btnPdf.setAttribute('aria-expanded', 'true');
          btnPdf.classList.add('video-pdf-btn--actif');
          btnPdfLbl.textContent = 'Masquer le support de cours';
          setTimeout(function () { pdfZone.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 80);
        } else {
          pdfZone.hidden = true;
          btnPdf.setAttribute('aria-expanded', 'false');
          btnPdf.classList.remove('video-pdf-btn--actif');
          btnPdfLbl.textContent = 'Voir le support de cours (PDF)';
        }
      });
    })();
  </script>
