  <style>
    /* ── Fond de page légèrement teinté ── */
    .hub-body { background: #EDE0C8; }

    /* ── Grille YouTube-style ── */
    .videos-grille {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding: 1rem;
      align-content: start;
    }

    @media (min-width: 600px)  { .videos-grille { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 900px)  { .videos-grille { grid-template-columns: repeat(5, 1fr); } }

    /* ── Carte vidéo ── */
    .video-card {
      background: var(--color-card);
      border-radius: var(--radius-lg);
      box-shadow: 0 2px 10px rgba(61,32,8,.10), 0 0 0 1.5px rgba(61,32,8,.06);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }

    .video-card:hover,
    .video-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 10px 28px rgba(61,32,8,.18), 0 0 0 2px var(--color-ok);
      outline: none;
    }

    .video-card:active { transform: scale(0.97); }

    /* ── Thumbnail wrapper (ratio 16:9 garanti) ── */
    .video-card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #1a1410;
      flex-shrink: 0;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .video-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.22s ease;
    }

    .video-card:hover .video-card-thumb img { transform: scale(1.05); }

    /* Dégradé bas permanent (lisibilité badge + play) */
    .video-card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.0) 40%,
        rgba(0,0,0,.50) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Badge numéro ── */
    .video-card-num {
      position: absolute;
      top: 0.45rem;
      left: 0.45rem;
      background: var(--color-ok);
      color: #fff;
      font-size: 0.66rem;
      font-weight: 800;
      border-radius: 50%;
      width: 1.45rem;
      height: 1.45rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 5px rgba(0,0,0,.45);
      z-index: 3;
      letter-spacing: 0;
    }

    /* ── Bouton play (toujours visible à 55%, cercle blanc) ── */
    .video-card-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      opacity: 0.55;
      transition: opacity 0.16s;
    }

    .video-card-play::after {
      content: '▶';
      background: rgba(255,255,255,.92);
      border-radius: 50%;
      width: 2.6rem;
      height: 2.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--color-text);
      padding-left: 0.12rem;
      box-shadow: 0 3px 14px rgba(0,0,0,.35);
      transition: transform 0.16s;
    }

    .video-card:hover .video-card-play       { opacity: 1; }
    .video-card:hover .video-card-play::after { transform: scale(1.12); }

    /* ── Infos sous la vignette ── */
    .video-card-info {
      padding: 0.5rem 0.6rem 0.6rem;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }

    .video-card-module {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-secondary);
    }

    .video-card-titre {
      font-size: clamp(0.72rem, 1.8vw, 0.84rem);
      font-weight: 800;
      letter-spacing: 0.03em;
      line-height: 1.2;
      color: var(--color-text);
    }

    .video-card-sub {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--color-ok);
      opacity: 0.85;
      margin-top: 0.05rem;
    }

    /* ── Modal lecteur ── */
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.80);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      animation: modal-fadein 0.15s ease-out;
    }
    .video-modal[hidden] { display: none; }

    @keyframes modal-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .video-modal-box {
      background: var(--color-bg);
      color: var(--color-text);
      width: 100%;
      max-width: 860px;
      max-height: 94dvh;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
      animation: modal-slidein 0.18s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes modal-slidein {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .video-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1rem;
      background: var(--color-text);
      color: var(--color-bg);
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      flex-shrink: 0;
    }

    .video-modal-titre {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .video-modal-fermer {
      background: rgba(255,255,255,.12);
      border: 1.5px solid rgba(255,255,255,.28);
      color: var(--color-bg);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .video-modal-fermer:hover { background: rgba(255,255,255,.26); }

    .video-player-wrap {
      padding: 0.8rem 0.8rem 0;
      flex-shrink: 0;
    }
    .video-player-wrap video {
      width: 100%;
      border-radius: var(--radius-sm);
      background: #000;
      display: block;
      max-height: 45dvh;
    }

    .video-player-wrap { padding-bottom: 0.8rem; }

      </div>

  <script>
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() { el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
      tick(); setInterval(tick, 10000);
    })();

    // Injecte "MODULE X" dans chaque carte
    document.querySelectorAll('.video-card').forEach(function (card) {
      const num  = card.querySelector('.video-card-num');
      const info = card.querySelector('.video-card-info');
      if (!num || !info) return;
      const lbl = document.createElement('span');
      lbl.className   = 'video-card-module';
      lbl.textContent = 'MODULE ' + num.textContent;
      info.insertBefore(lbl, info.firstChild);
    });

    (function () {
      const modal     = document.getElementById('video-modal');
      const titreEl   = document.getElementById('modal-titre-text');
      const videoEl   = document.getElementById('video-player');
      const srcEl     = document.getElementById('video-src');
      const btnFermer = document.getElementById('btn-modal-fermer');

      document.getElementById('videos-grille').addEventListener('click', function (e) {
        const card = e.target.closest('.video-card');
        if (!card) return;
        titreEl.textContent = card.dataset.titre || '';
        srcEl.src = card.dataset.video || '';
        videoEl.load();
        modal.hidden = false;
        document.body.style.overflow = 'hidden';
        videoEl.play().catch(function () {});
      });

      function fermer() {
        videoEl.pause();
        srcEl.src = '';
        modal.hidden = true;
        document.body.style.overflow = '';
      }

      btnFermer.addEventListener('click', fermer);
      modal.addEventListener('click', function (e) { if (e.target === modal) fermer(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !modal.hidden) fermer(); });
    })();
  </script>
