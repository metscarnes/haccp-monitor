<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Vidéos Hygiène — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/hub.css">
  <style>
    /* ── Grille vidéos ── */
    .videos-grille {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.75rem;
      padding: 0.75rem;
      align-content: start;
    }

    @media (min-width: 768px) and (orientation: landscape) {
      .videos-grille {
        grid-template-columns: repeat(5, 1fr);
        align-content: stretch;
      }
    }

    /* ── Tuile vidéo ── */
    .video-tuile {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      border: 3px solid var(--color-ok);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.75rem 0.5rem;
      cursor: pointer;
      position: relative;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      min-height: 110px;
      color: var(--color-text);
      text-align: center;
    }

    .video-tuile:active {
      transform: scale(0.96);
      box-shadow: 0 1px 8px rgba(61,32,8,.08);
    }

    .video-tuile-num {
      position: absolute;
      top: 0.4rem;
      left: 0.5rem;
      font-size: 0.7rem;
      font-weight: 800;
      background: var(--color-ok);
      color: #fff;
      border-radius: 50%;
      width: 1.4rem;
      height: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .video-tuile-icone {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1;
    }

    .video-tuile-nom {
      font-size: clamp(0.62rem, 1.8vw, 0.8rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    .video-tuile-label {
      font-size: 0.65rem;
      opacity: 0.65;
      line-height: 1.2;
    }

    /* ── Modal lecteur vidéo ── */
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      animation: modal-fadein 0.15s ease-out;
    }

    .video-modal[hidden] { display: none; }

    @keyframes modal-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .video-modal-box {
      background: var(--color-bg, #fff);
      color: var(--color-text);
      width: 100%;
      max-width: 860px;
      max-height: 94dvh;
      border-radius: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: modal-slidein 0.18s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes modal-slidein {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .video-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: var(--color-text);
      color: var(--color-bg);
      border-radius: 14px 14px 0 0;
      flex-shrink: 0;
    }

    .video-modal-titre {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .video-modal-fermer {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.30);
      color: var(--color-bg);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .video-modal-fermer:hover,
    .video-modal-fermer:active {
      background: rgba(255,255,255,.28);
    }

    /* ── Lecteur vidéo ── */
    .video-player-wrap {
      padding: 0.75rem 0.75rem 0;
      flex-shrink: 0;
    }

    .video-player-wrap video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: block;
      max-height: 45dvh;
    }

    /* ── Bouton PDF ── */
    .video-pdf-btn {
      margin: 0.75rem 0.75rem 0;
      padding: 0.75rem 1.25rem;
      background: var(--color-card);
      border: 2px solid var(--color-secondary);
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.15s, border-color 0.15s;
      color: var(--color-text);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .video-pdf-btn:hover,
    .video-pdf-btn:active {
      background: var(--color-secondary);
      color: var(--color-bg);
      border-color: var(--color-secondary);
    }

    .video-pdf-btn--actif {
      background: var(--color-ok);
      border-color: var(--color-ok);
      color: #fff;
    }

    .video-pdf-btn--actif:hover,
    .video-pdf-btn--actif:active {
      background: var(--color-ok);
    }

    /* ── Zone PDF ── */
    .video-pdf-zone {
      margin: 0.75rem 0.75rem 0.75rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.1);
      flex-shrink: 0;
    }

    .video-pdf-zone[hidden] { display: none; }

    .video-pdf-zone iframe {
      width: 100%;
      height: 42dvh;
      display: block;
      border: none;
    }
  </style>
</head>
<body class="hub-body">

  <!-- ========================================================
       EN-TÊTE
  ========================================================= -->
  <header class="hub-header">
    <a href="/elearning-hygiene.html" class="hub-btn-admin" aria-label="Retour à Hygiène">← Hygiène</a>
    <div class="hub-titre">VIDÉOS HYGIÈNE</div>
    <div id="hub-horloge" class="hub-horloge" aria-live="polite"></div>
  </header>

  <!-- ========================================================
       GRILLE — 10 tuiles vidéo
  ========================================================= -->

      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="2"
            data-titre="MODULE 2 — LE PND"
            data-video="/static/docs/Vid%C3%A9os/2%20LE%20PND.mp4"

            aria-label="Vidéo 2 — Le PND">
      <span class="video-tuile-num">2</span>
      <div class="video-tuile-icone" aria-hidden="true">🧹</div>
      <div class="video-tuile-nom">LE PND</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="3"
            data-titre="MODULE 3 — LE VESTIAIRE"
            data-video="/static/docs/Vid%C3%A9os/3%20LE%20VESTIAIRE.mp4"
            data-pdf="/static/docs/Modules%20hygiene/3%20LE%20VESTIAIRE.pdf"
            aria-label="Vidéo 3 — Le Vestiaire">
      <span class="video-tuile-num">3</span>
      <div class="video-tuile-icone" aria-hidden="true">👕</div>
      <div class="video-tuile-nom">VESTIAIRE</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="4"
            data-titre="MODULE 4 — RÉCEPTION"
            data-video="/static/docs/Vid%C3%A9os/4%20RECEPTION.mp4"
            data-pdf="/static/docs/Modules%20hygiene/4%20RECEPTION.pdf"
            aria-label="Vidéo 4 — Réception">
      <span class="video-tuile-num">4</span>
      <div class="video-tuile-icone" aria-hidden="true">📦</div>
      <div class="video-tuile-nom">RÉCEPTION</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="5"
            data-titre="MODULE 5 — TEMPÉRATURES"
            data-video="/static/docs/Vid%C3%A9os/5%20TEMPERATURES.mp4"
            data-pdf="/static/docs/Modules%20hygiene/5%20TEMPERATURES.pdf"
            aria-label="Vidéo 5 — Températures">
      <span class="video-tuile-num">5</span>
      <div class="video-tuile-icone" aria-hidden="true">🌡️</div>
      <div class="video-tuile-nom">TEMPÉRATURES</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="6"
            data-titre="MODULE 6 — TRAÇABILITÉ"
            data-video="/static/docs/Vid%C3%A9os/6%20TRACABILITE.mp4"
            data-pdf="/static/docs/Modules%20hygiene/6%20TRACABILITE.pdf"
            aria-label="Vidéo 6 — Traçabilité">
      <span class="video-tuile-num">6</span>
      <div class="video-tuile-icone" aria-hidden="true">🔍</div>
      <div class="video-tuile-nom">TRAÇABILITÉ</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="7"
            data-titre="MODULE 7 — STOCK ET FABRICATION"
            data-video="/static/docs/Vid%C3%A9os/7%20STOCK%20ET%20FABRICATION.mp4"
            data-pdf="/static/docs/Modules%20hygiene/7%20STOCK%20ET%20FABRICATION.pdf"
            aria-label="Vidéo 7 — Stock et Fabrication">
      <span class="video-tuile-num">7</span>
      <div class="video-tuile-icone" aria-hidden="true">🏭</div>
      <div class="video-tuile-nom">FABRICATION</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="8"
            data-titre="MODULE 8 — CUISSON"
            data-video="/static/docs/Vid%C3%A9os/8%20CUISSON.mp4"
            data-pdf="/static/docs/Modules%20hygiene/8%20CUISSON.pdf"
            aria-label="Vidéo 8 — Cuisson">
      <span class="video-tuile-num">8</span>
      <div class="video-tuile-icone" aria-hidden="true">🍳</div>

      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="9"
            data-titre="MODULE 9 — REFROIDISSEMENT"
            data-video="/static/docs/Vid%C3%A9os/9%20REFROIDISSEMENT.mp4"
            data-pdf="/static/docs/Modules%20hygiene/9%20REFROIDISSEMENT.pdf"
            aria-label="Vidéo 9 — Refroidissement">
      <span class="video-tuile-num">9</span>
      <div class="video-tuile-icone" aria-hidden="true">❄️</div>
      <div class="video-tuile-nom">REFROIDIS.</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

    <button class="video-tuile"
            data-num="10"
            data-titre="MODULE 10 — STOCKAGE ET ALLERGÈNES"
            data-video="/static/docs/Vid%C3%A9os/10%20STOCKAGE%20ET%20ALLERGENES.mp4"
            data-pdf="/static/docs/Modules%20hygiene/10%20STOCKAGE%20ET%20ALLERGENES.pdf"
            aria-label="Vidéo 10 — Stockage et Allergènes">
      <span class="video-tuile-num">10</span>
      <div class="video-tuile-icone" aria-hidden="true">⚠️</div>
      <div class="video-tuile-nom">ALLERGÈNES</div>
      <div class="video-tuile-label">Vidéo + PDF</div>
    </button>

  </main>

  <!-- ========================================================
       MODAL — Lecteur vidéo + PDF optionnel
  ========================================================= -->
  <div id="video-modal" class="video-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-titre-text">

    <div class="video-modal-box">

      <!-- En-tête -->
      <div class="video-modal-header">
        <span class="video-modal-titre" id="modal-titre-text"></span>
        <button class="video-modal-fermer" id="btn-modal-fermer" aria-label="Fermer le lecteur">✕</button>
      </div>

      <!-- Lecteur vidéo -->
      <div class="video-player-wrap">
        <video id="video-player" controls playsinline preload="metadata">
          <source id="video-src" src="" type="video/mp4">
          Votre navigateur ne supporte pas la lecture vidéo.
        </video>
      </div>

      <!-- Bouton support PDF -->
      <button class="video-pdf-btn" id="btn-pdf-toggle" aria-expanded="false" aria-controls="video-pdf-zone">
        <span>📄</span>
        <span id="btn-pdf-label">Voir le support de cours (PDF)</span>
      </button>

      <!-- Zone PDF -->
      <div class="video-pdf-zone" id="video-pdf-zone" hidden>
        <iframe id="pdf-frame" src="" title="Support de cours PDF" loading="lazy"></iframe>
      </div>

    </div>
  </div>

  <script>
    // ── Horloge ──
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() {
        el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      }
      tick();
      setInterval(tick, 10000);
    })();

    // ── Lecteur vidéo ──
    (function () {
      const modal      = document.getElementById('video-modal');
      const titreEl    = document.getElementById('modal-titre-text');
      const videoEl    = document.getElementById('video-player');
      const srcEl      = document.getElementById('video-src');
      const btnFermer  = document.getElementById('btn-modal-fermer');
      const btnPdf     = document.getElementById('btn-pdf-toggle');
      const btnPdfLbl  = document.getElementById('btn-pdf-label');
      const pdfZone    = document.getElementById('video-pdf-zone');
      const pdfFrame   = document.getElementById('pdf-frame');

      let pdfOuvert = false;
      let pdfUrl    = '';

      // Ouvrir le modal au clic sur une tuile
      document.getElementById('videos-grille').addEventListener('click', function (e) {
        const tuile = e.target.closest('.video-tuile');
        if (!tuile) return;

        titreEl.textContent  = tuile.dataset.titre || '';
        pdfUrl               = tuile.dataset.pdf   || '';
        srcEl.src            = tuile.dataset.video || '';

        // Réinitialiser le PDF
        pdfOuvert = false;
        pdfZone.hidden = true;
        pdfFrame.src   = '';
        btnPdf.setAttribute('aria-expanded', 'false');
        btnPdf.classList.remove('video-pdf-btn--actif');
        btnPdfLbl.textContent = 'Voir le support de cours (PDF)';

        videoEl.load();
        modal.hidden = false;
        document.body.style.overflow = 'hidden';

        // Lancer la lecture automatiquement si possible
        videoEl.play().catch(function () { /* autoplay bloqué, l'utilisateur peut lancer manuellement */ });
      });

      // Fermer le modal
      function fermerModal() {
        videoEl.pause();
        videoEl.src = '';
        srcEl.src   = '';
        pdfFrame.src = '';
        modal.hidden = true;
        document.body.style.overflow = '';
      }

      btnFermer.addEventListener('click', fermerModal);

      // Fermer au clic sur le fond
      modal.addEventListener('click', function (e) {
        if (e.target === modal) fermerModal();
      });

      // Touche Échap
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !modal.hidden) fermerModal();
      });

      // Toggle PDF
      btnPdf.addEventListener('click', function () {
        pdfOuvert = !pdfOuvert;

        if (pdfOuvert) {
          if (!pdfFrame.src || pdfFrame.src === window.location.href) {
            pdfFrame.src = pdfUrl;
          }
          pdfZone.hidden = false;
          btnPdf.setAttribute('aria-expanded', 'true');
          btnPdf.classList.add('video-pdf-btn--actif');
          btnPdfLbl.textContent = 'Masquer le support de cours';
          // Faire défiler pour montrer le PDF
          setTimeout(function () {
            pdfZone.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }, 80);
        } else {
          pdfZone.hidden = true;
          btnPdf.setAttribute('aria-expanded', 'false');
          btnPdf.classList.remove('video-pdf-btn--actif');
          btnPdfLbl.textContent = 'Voir le support de cours (PDF)';
        }
      });
    })();
  </script>
</body>
</html>
