  <style>
    /* ── Grille YouTube-style ── */
    .videos-grille {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.9rem;
      padding: 0.9rem;
      align-content: start;
    }

    @media (min-width: 600px) {
      .videos-grille { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 900px) {
      .videos-grille { grid-template-columns: repeat(5, 1fr); }
    }

    /* ── Carte vidéo ── */
    .video-card {
      background: var(--color-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      border: 2px solid transparent;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
    }

    .video-card:hover,
    .video-card:focus-visible {
      border-color: var(--color-ok);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(61,32,8,.18);
    }

    .video-card:active {
      transform: scale(0.97);
    }

    /* Thumbnail wrapper — conserve le ratio 16:9 */
    .video-card-thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #111;
      flex-shrink: 0;
    }

    .video-card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.2s;
    }

    .video-card:hover .video-card-thumb img {
      transform: scale(1.04);
    }

    /* Badge numéro */
    .video-card-num {
      position: absolute;
      top: 0.4rem;
      left: 0.4rem;
      background: var(--color-ok);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 800;
      border-radius: 50%;
      width: 1.4rem;
      height: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
      z-index: 2;
    }

    /* Overlay play au hover */
    .video-card-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.30);
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 2;
      font-size: clamp(1.8rem, 5vw, 2.4rem);
      color: #fff;
    }

    .video-card:hover .video-card-play,
    .video-card:focus-visible .video-card-play {
      opacity: 1;
    }

    /* Infos sous la vignette */
    .video-card-info {
      padding: 0.45rem 0.55rem 0.55rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .video-card-titre {
      font-size: clamp(0.7rem, 1.8vw, 0.82rem);
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1.25;
      color: var(--color-text);
    }

    .video-card-sub {
      font-size: 0.65rem;
      color: var(--color-ok);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* ── Modal lecteur ── */
    .video-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem;
      animation: modal-fadein 0.15s ease-out;
    }
    .video-modal[hidden] { display: none; }

    @keyframes modal-fadein {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .video-modal-box {
      background: var(--color-bg, #fff);
      color: var(--color-text);
      width: 100%;
      max-width: 860px;
      max-height: 94dvh;
      border-radius: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      animation: modal-slidein 0.18s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes modal-slidein {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .video-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1rem;
      background: var(--color-text);
      color: var(--color-bg);
      border-radius: 14px 14px 0 0;
      flex-shrink: 0;
    }

    .video-modal-titre {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .video-modal-fermer {
      background: rgba(255,255,255,.15);
      border: 1.5px solid rgba(255,255,255,.30);
      color: var(--color-bg);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .video-modal-fermer:hover { background: rgba(255,255,255,.28); }

    .video-player-wrap {
      padding: 0.75rem 0.75rem 0;
      flex-shrink: 0;
    }
    .video-player-wrap video {
      width: 100%;
      border-radius: 8px;
      background: #000;
      display: block;
      max-height: 45dvh;
    }

    .video-pdf-btn {
      margin: 0.75rem 0.75rem 0;
      padding: 0.75rem 1.25rem;
      background: var(--color-card);
      border: 2px solid var(--color-secondary);
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.15s, border-color 0.15s;
      color: var(--color-text);
      flex-shrink: 0;
    }
    .video-pdf-btn:hover { background: var(--color-secondary); color: var(--color-bg); }
    .video-pdf-btn--actif { background: var(--color-ok); border-color: var(--color-ok); color: #fff; }

    .video-pdf-zone {
      margin: 0.75rem;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,.1);
      flex-shrink: 0;
    }
    .video-pdf-zone[hidden] { display: none; }
    .video-pdf-zone iframe {
      width: 100%;
      height: 42dvh;
      display: block;
      border: none;
    }
  </style>
</head>

  <!-- Modal lecteur -->
  <div id="video-modal" class="video-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-titre-text">
    <div class="video-modal-box">
      <div class="video-modal-header">
        <span class="video-modal-titre" id="modal-titre-text"></span>
        <button class="video-modal-fermer" id="btn-modal-fermer" aria-label="Fermer">✕</button>
      </div>
      <div class="video-player-wrap">
        <video id="video-player" controls playsinline preload="metadata">
          <source id="video-src" src="" type="video/mp4">
        </video>
      </div>
      <button class="video-pdf-btn" id="btn-pdf-toggle" aria-expanded="false">
        <span>📄</span>
        <span id="btn-pdf-label">Voir le support de cours (PDF)</span>
      </button>
      <div class="video-pdf-zone" id="video-pdf-zone" hidden>
        <iframe id="pdf-frame" src="" title="Support PDF" loading="lazy"></iframe>
      </div>
    </div>

  <script>
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() { el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
      tick(); setInterval(tick, 10000);
    })();

    (function () {
      const modal     = document.getElementById('video-modal');
      const titreEl   = document.getElementById('modal-titre-text');
      const videoEl   = document.getElementById('video-player');
      const srcEl     = document.getElementById('video-src');
      const btnFermer = document.getElementById('btn-modal-fermer');
      const btnPdf    = document.getElementById('btn-pdf-toggle');
      const btnPdfLbl = document.getElementById('btn-pdf-label');
      const pdfZone   = document.getElementById('video-pdf-zone');
      const pdfFrame  = document.getElementById('pdf-frame');
      let pdfOuvert = false, pdfUrl = '';

      document.getElementById('videos-grille').addEventListener('click', function (e) {
        const card = e.target.closest('.video-card');
        if (!card) return;
        titreEl.textContent = card.dataset.titre || '';
        pdfUrl = card.dataset.pdf || '';
        srcEl.src = card.dataset.video || '';
        pdfOuvert = false;
        pdfZone.hidden = true;
        pdfFrame.src = '';
        btnPdf.setAttribute('aria-expanded', 'false');
        btnPdf.classList.remove('video-pdf-btn--actif');
        btnPdfLbl.textContent = 'Voir le support de cours (PDF)';
        videoEl.load();
        modal.hidden = false;
        document.body.style.overflow = 'hidden';
        videoEl.play().catch(function () {});
      });

      function fermer() {
        videoEl.pause();
        srcEl.src = '';
        pdfFrame.src = '';
        modal.hidden = true;
        document.body.style.overflow = '';
      }

      btnFermer.addEventListener('click', fermer);
      modal.addEventListener('click', function (e) { if (e.target === modal) fermer(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !modal.hidden) fermer(); });

      btnPdf.addEventListener('click', function () {
        pdfOuvert = !pdfOuvert;
        if (pdfOuvert) {
          if (!pdfFrame.src || pdfFrame.src === window.location.href) pdfFrame.src = pdfUrl;
          pdfZone.hidden = false;
          btnPdf.setAttribute('aria-expanded', 'true');
          btnPdf.classList.add('video-pdf-btn--actif');
          btnPdfLbl.textContent = 'Masquer le support de cours';
          setTimeout(function () { pdfZone.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 80);
        } else {
          pdfZone.hidden = true;
          btnPdf.setAttribute('aria-expanded', 'false');
          btnPdf.classList.remove('video-pdf-btn--actif');
          btnPdfLbl.textContent = 'Voir le support de cours (PDF)';
        }
      });
    })();
  </script>
