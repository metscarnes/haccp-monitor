<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3D2008">
  <title>Formation Hygiène — Au Comptoir des Lilas</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="stylesheet" href="/static/css/reset.css">
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/layouts.css">
  <link rel="stylesheet" href="/static/css/pages/hub.css">
</head>
<body class="hub-body">

  <!-- ========================================================
       EN-TÊTE
  ========================================================= -->
  <header class="hub-header">
    <a href="/elearning.html" class="hub-btn-admin" aria-label="Retour à l'E-Learning">← E-Learning</a>
    <div class="hub-titre">HYGIÈNE</div>
    <div id="hub-horloge" class="hub-horloge" aria-live="polite"></div>
  </header>

  <!-- ========================================================
       GRILLE — Modes de formation Hygiène
  ========================================================= -->
  <main class="hub-grille" role="main" style="grid-template-columns: 1fr 1fr; grid-template-rows: 1fr;">

    <!-- ── Document PDF (avec validation lecture) ── -->
    <a class="hub-tuile hub-tuile--ok" id="tuile-hygiene-pdf"
       href="/elearning-pdf-viewer.html?module=hygiene-pdf&titre=Hygi%C3%A8ne&pdf=/static/docs/hygiene.pdf"
       aria-label="Lire le document Hygiène">
      <div class="hub-tuile-icone" aria-hidden="true">📄</div>
      <div class="hub-tuile-titre">DOCUMENT</div>
      <div class="hub-tuile-statut">Lire le guide PDF<br><small>Validation traçable</small></div>
    </a>

    <!-- ── Module interactif (à venir) ── -->
    <a class="hub-tuile hub-tuile--chargement" id="tuile-hygiene-module"
       href="#" aria-label="Module interactif (bientôt disponible)"
       onclick="event.preventDefault(); alert('Module interactif disponible prochainement.');">
      <div class="hub-tuile-icone" aria-hidden="true">🎓</div>
      <div class="hub-tuile-titre">MODULE</div>
      <div class="hub-tuile-statut">Cours interactif + quiz<br><small>Bientôt disponible</small></div>
    </a>

  </main>

  <script>
    // Horloge
    (function () {
      const el = document.getElementById('hub-horloge');
      if (!el) return;
      function tick() {
        el.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      }
      tick();
      setInterval(tick, 10000);
    })();
  </script>
</body>
</html>
